<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>FitAR 動活+ | FitAR Move+</title>

<style>
body {
  margin:0;
  font-family: 'Microsoft JhengHei', 'Heiti TC', sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* ===== 共用畫面 ===== */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index: 10;
}

#startScreen {
  background:linear-gradient(#0f2027,#203a43,#2c5364);
}

#startScreen h1 {
  font-size: 60px;
  margin-bottom: 5px;
  text-shadow: 0 0 15px #00C2FF;
}

#startScreen h2 {
  font-size: 36px;
  color: #00C2FF;
  margin-top: 0;
  margin-bottom: 40px;
  font-weight: bold;
}

/* 特大號進入按鈕 */
.start-btn {
  padding: 25px 70px;
  border: 4px solid #fff;
  border-radius: 60px;
  font-size: 36px;
  cursor: pointer;
  background: #00d4ff;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
  transition: all 0.2s;
}
.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0, 212, 255, 0.9);
}

/* ===== 遊戲畫面 ===== */
#gameScreen {
  display:none;
  position: relative;
  width: 100vw;
  height: 100vh;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* 右上方特大繁體中文 UI 面板 */
#topUI {
  position:absolute;
  top:20px;
  right:30px;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.panel {
  padding: 15px 40px;
  border-radius: 25px;
  background: rgba(0,0,0,0.85);
  font-size: 36px;
  font-weight: bold;
  border: 3px solid rgba(255,255,255,0.4);
  text-align: right;
  min-width: 220px;
}

#timerPanel {
  color: #FF3366;
  border-color: #FF3366;
  text-shadow: 0 0 10px #FF3366;
}

/* 頂部大 WARM UP 標題 */
#stageTitle {
  position: absolute;
  top: 25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 45px;
  font-weight: 900;
  color: #FFF;
  text-shadow: 0 0 15px #00C2FF;
  z-index: 5;
  letter-spacing: 3px;
}

/* 動作提示字：特大、清晰、強調慢慢做 */
#instruction-box {
  position: absolute;
  top: 110px;
  width: 100%;
  text-align: center;
  z-index: 5;
}

#instruction {
  display: inline-block;
  padding: 20px 50px;
  background: rgba(0, 0, 0, 0.85);
  border-radius: 40px;
  border: 4px solid #00d4ff;
  font-size: 52px;
  color: #fff;
  font-weight: 900;
  text-shadow: 0 0 15px #00d4ff;
  letter-spacing: 2px;
}

.slow-text {
  color: #FFD600;
  text-shadow: 0 0 10px #FFD600;
}

/* 保證 100% 顯現的特大純色塊卡通公仔組（女孩+男孩） */
#coachContainer {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: 80px;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
}

.avatar-coach {
  width: 340px;  /* 特大尺寸 */
  height: 400px;
}

/* 人體骨架點樣式：預設為科技藍色 */
.joint-dot {
  fill: #00E5FF;
  stroke: #fff;
  stroke-width: 1.5;
  transition: fill 0.2s, r 0.2s;
}

/* 當確認做到時，藍點變綠點並放大發光 */
.joint-success {
  fill: #00FF88 !important;
  r: 5px !important;
  filter: drop-shadow(0 0 8px #00FF88);
}

/* 全中文特大評級反饋（完美 / 良好） */
#rating {
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  font-size: 130px;
  font-weight: 900;
  letter-spacing: 6px;
  opacity:0;
  z-index: 10;
  pointer-events: none;
}

/* 分數浮字 */
#scorePop {
  position:absolute;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size: 80px;
  color:#FFD600;
  font-weight: 900;
  text-shadow: 0 0 15px #FFD600;
  opacity:0;
  z-index: 8;
  transition: transform 0.4s ease-out, opacity 0.4s ease-out;
  pointer-events: none;
}

/* 噴發粒子 */
.particle {
  position:absolute;
  width:12px;
  height:12px;
  background:#00FF88;
  border-radius:50%;
  z-index: 6;
  pointer-events: none;
  animation: particleMove 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes particleMove { to { transform: translate(var(--mx), var(--my)); opacity:0; } }

/* 結算畫面 */
#endScreen {
  display:none;
  background:#111;
}
#finalScore {
  font-size: 65px;
  margin-bottom: 40px;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>FitAR 動活+</h1>
  <h2>慢速健康熱身模式 🎵</h2>
  <button class="start-btn" onclick="startGame()">開始慢慢做運動</button>
</div>

<div id="gameScreen">
  <div id="stageTitle">熱身運動 WARM UP</div>

  <div id="topUI">
    <div id="score" class="panel">目前得分: 0</div>
    <div id="timerPanel" class="panel">剩餘時間: 60</div>
  </div>

  <div id="instruction-box">
    <div id="instruction"><span class="slow-text">慢慢做：</span>準備中...</div>
  </div>

  <div id="coachContainer">
    
    <svg class="avatar-coach" id="girlCoach" viewBox="0 0 100 120">
      <path d="M25,25 C10,20 5,45 20,50 C15,35 20,28 25,25 Z" fill="#4A2711" />
      <path id="girlLeftArm" d="M32,55 C20,35 22,20 28,10 C32,20 30,40 35,55 Z" fill="#FFD1A9" />
      <path id="girlRightArm" d="M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z" fill="#FFD1A9" />
      <path d="M35,55 L65,55 L60,85 L40,85 Z" fill="#00E5FF" />
      <circle cx="50" cy="40" r="18" fill="#FFD1A9" />
      <path d="M32,35 C32,20 68,20 68,35 C68,22 32,22 32,35 Z" fill="#4A2711" />
      <circle cx="44" cy="38" r="2.5" fill="#000" />
      <circle cx="56" cy="38" r="2.5" fill="#000" />
      <path d="M46,48 Q50,52 54,48" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" />
      <path d="M40,85 L60,85 L62,98 L51,98 L50,88 L49,98 L38,98 Z" fill="#007A8A" />
      <rect x="41" y="98" width="6" height="12" rx="3" fill="#FFD1A9" />
      <rect x="53" y="98" width="6" height="12" rx="3" fill="#FFD1A9" />
      <path d="M39,110 H48 V115 H39 Z" fill="#00E5FF" />
      <path d="M52,110 H61 V115 H52 Z" fill="#00E5FF" />
      
      <circle id="g_lh" class="joint-dot" cx="28" cy="10" r="3.5" />  <circle id="g_rh" class="joint-dot" cx="72" cy="10" r="3.5" />  <circle id="g_lk" class="joint-dot" cx="44" cy="104" r="3.5" /> <circle id="g_rk" class="joint-dot" cx="56" cy="104" r="3.5" /> </svg>

    <svg class="avatar-coach" id="boyCoach" viewBox="0 0 100 120">
      <path id="boyLeftArm" d="M32,55 C20,35 22,20 28,10 C32,20 30,40 35,55 Z" fill="#FFD1A9" />
      <path id="boyRightArm" d="M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z" fill="#FFD1A9" />
      <path d="M35,55 L65,55 L60,85 L40,85 Z" fill="#FF6D00" />
      <circle cx="50" cy="40" r="18" fill="#FFD1A9" />
      <path d="M31,32 C30,15 45,10 50,18 C55,10 70,15 69,32 C72,25 28,25 31,32 Z" fill="#6d4c41" />
      <circle cx="44" cy="39" r="2.5" fill="#000" />
      <circle cx="56" cy="39" r="2.5" fill="#000" />
      <path d="M45,49 Q50,53 55,49" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" />
      <path d="M40,85 L60,85 L62,98 L51,98 L50,88 L49,98 L38,98 Z" fill="#29B6F6" />
      <rect x="41" y="98" width="6" height="12" rx="3" fill="#FFD1A9" />
      <rect x="53" y="98" width="6" height="12" rx="3" fill="#FFD1A9" />
      <path d="M39,110 H48 V115 H39 Z" fill="#FF6D00" />
      <path d="M52,110 H61 V115 H52 Z" fill="#FF6D00" />
      
      <circle id="b_lh" class="joint-dot" cx="28" cy="10" r="3.5" />  <circle id="b_rh" class="joint-dot" cx="72" cy="10" r="3.5" />  <circle id="b_lk" class="joint-dot" cx="44" cy="104" r="3.5" /> <circle id="b_rk" class="joint-dot" cx="56" cy="104" r="3.5" /> </svg>
  </div>

  <div id="rating"></div>
  <div id="scorePop">+20</div>

  <video id="video" style="display:none;" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="endScreen" class="screen">
  <h1 id="finalScore"></h1>
  <button class="start-btn" onclick="location.reload()">再玩一次</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let score = 0, timeLeft = 60; // 延長至 60 秒完整體驗
let last = null, beatWindow = 0, beatChecked = false;
let currentAction = "reach";
let currentActionIndex = 0;
let beatInterval, actionInterval, timerInterval;

// 👉 完整 8 大中文慢速熱身動作清單
const actionsList = ["reach", "run", "knees", "star", "highlow", "jacks", "clap", "freeze"];

const instruction = document.getElementById("instruction");
const scoreText = document.getElementById("score");
const rating = document.getElementById("rating");

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function beat(){
  if (!beatChecked && beatWindow > 0) {
    showRating("加油！再試試看");
  }
  beatWindow = Date.now();
  beatChecked = false;
  resetJointDots(); // 每拍重置公仔藍點顏色
}

// 變更並刷新 8 大動作 UI 與公仔姿勢
function changeActionTo(index) {
  currentActionIndex = index;
  currentAction = actionsList[index];
  beatChecked = false;
  resetJointDots();

  const gLeft = document.getElementById("girlLeftArm");
  const gRight = document.getElementById("girlRightArm");
  const bLeft = document.getElementById("boyLeftArm");
  const bRight = document.getElementById("boyRightArm");
  
  // 藍點的 SVG 物件
  const dots = ["g_lh", "g_rh", "b_lh", "b_rh"];

  // 1. REACH UP HIGH (雙手高舉)
  if(currentAction === "reach") {
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>雙手高舉過頭 🙌`;
    setArmsUp(gLeft, gRight, bLeft, bRight, dots, 10);
  }
  // 2. RUN IN PLACE (原地踏步)
  if(currentAction === "run") {
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>原地輕鬆踏步 🏃`;
    setArmsDown(gLeft, gRight, bLeft, bRight, dots);
  }
  // 3. HIGH KNEES (慢速高抬腿)
  if(currentAction === "knees") {
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>慢速高抬腿 ⚡`;
    setArmsDown(gLeft, gRight, bLeft, bRight, dots);
  }
  // 4. STAR JUMPS (星星大張開)
  if(currentAction === "star") {
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>雙手雙腳張開 ⭐`;
    setArmsOut(gLeft, gRight, bLeft, bRight, dots);
  }
  // 5. HIGH AND LOW (高低大伸展)
  if(currentAction === "highlow") {
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>向上摸天、向下蹲 ↕`;
    setArmsUp(gLeft, gRight, bLeft, bRight, dots, 10);
  }
  // 6. JUMPING JACKS (慢速開合跳)
  if(currentAction === "jacks") {
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>慢速開合跳 🕺`;
    setArmsOut(gLeft, gRight, bLeft, bRight, dots);
  }
  // 7. WAVE AND CLAP (胸前雙手擊掌)
  if(currentAction === "clap") {
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>雙手胸前擊掌 👏`;
    // 手臂向中央靠攏
    gLeft.setAttribute("d", "M35,55 C35,45 42,40 45,45 C42,55 38,55 35,55 Z");
    gRight.setAttribute("d", "M65,55 C65,45 58,40 55,45 C58,55 62,55 65,55 Z");
    bLeft.setAttribute("d", "M35,55 C35,45 42,40 45,45 C42,55 38,55 35,55 Z");
    bRight.setAttribute("d", "M65,55 C65,45 58,40 55,45 C58,55 62,55 65,55 Z");
    updateDotPos("g_lh", 45, 45); updateDotPos("g_rh", 55, 45);
    updateDotPos("b_lh", 45, 45); updateDotPos("b_rh", 55, 45);
  }
  // 8. SHAKE AND FREEZE (定格不動)
  if(currentAction === "freeze") {
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>全身定格不要動 ❄`;
    setArmsUp(gLeft, gRight, bLeft, bRight, dots, 20);
  }
}

// 輔助函式：動態調整 SVG 手臂與藍點位置
function setArmsUp(gl, gr, bl, br, ds, y) {
  gl.setAttribute("d", `M32,55 C20,35 22,20 28,${y} C32,20 30,40 35,55 Z`);
  gr.setAttribute("d", `M68,55 C80,35 78,20 72,${y} C68,20 70,40 65,55 Z`);
  bl.setAttribute("d", `M32,55 C20,35 22,20 28,${y} C32,20 30,40 35,55 Z`);
  br.setAttribute("d", `M68,55 C80,35 78,20 72,${y} C68,20 70,40 65,55 Z`);
  ds.forEach((id, i) => updateDotPos(id, i%2===0 ? 28 : 72, y));
}
function setArmsDown(gl, gr, bl, br, ds) {
  gl.setAttribute("d", "M35,55 C25,65 22,75 25,85 C30,75 32,65 35,55 Z");
  gr.setAttribute("d", "M65,55 C75,65 78,75 75,85 C70,75 68,65 65,55 Z");
  bl.setAttribute("d", "M35,55 C25,65 22,75 25,85 C30,75 32,65 35,55 Z");
  br.setAttribute("d", "M65,55 C75,65 78,75 75,85 C70,75 68,65 65,55 Z");
  ds.forEach((id, i) => updateDotPos(id, i%2===0 ? 25 : 75, 85));
}
function setArmsOut(gl, gr, bl, br, ds) {
  gl.setAttribute("d", "M35,55 C15,50 10,45 5,45 C10,55 20,58 35,55 Z");
  gr.setAttribute("d", "M65,55 C85,50 90,45 95,45 C90,55 80,58 65,55 Z");
  bl.setAttribute("d", "M35,55 C15,50 10,45 5,45 C10,55 20,58 35,55 Z");
  br.setAttribute("d", "M65,55 C85,50 90,45 95,45 C90,55 80,58 65,55 Z");
  ds.forEach((id, i) => updateDotPos(id, i%2===0 ? 5 : 95, 45));
}
function updateDotPos(id, x, y) {
  const el = document.getElementById(id);
  el.setAttribute("cx", x); el.setAttribute("cy", y);
}

// 重置所有人體藍點
function resetJointDots() {
  document.querySelectorAll('.joint-dot').forEach(dot => dot.classList.remove('joint-success'));
}

// 👉 確認做到！點亮人體綠點提示玩家
function lightUpJoints() {
  let targets = [];
  if(currentAction === "reach" || currentAction === "highlow" || currentAction === "freeze") targets = ["g_lh", "g_rh", "b_lh", "b_rh"];
  if(currentAction === "run" || currentAction === "knees") targets = ["g_lk", "g_rk", "b_lk", "b_rk"];
  if(currentAction === "star" || currentAction === "jacks" || currentAction === "clap") targets = ["g_lh", "g_rh", "b_lh", "b_rh"];
  
  targets.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.add('joint-success');
  });
}

function newAction(){
  let nextIndex = (currentActionIndex + 1) % actionsList.length;
  changeActionTo(nextIndex);
}

// ===== 核心 8 大動作 AI 骨架演算法 =====
function checkPose(lm) {
  switch(currentAction) {
    case "reach": 
      return lm[15].y < lm[0].y && lm[16].y < lm[0].y;
    case "run": 
      return Math.abs(lm[25].y - lm[26].y) > 0.04;
    case "knees": 
      return lm[25].y < lm[23].y || lm[26].y < lm[24].y;
    case "star": 
      return (lm[15].y < lm[0].y && lm[16].y < lm[0].y) && (Math.abs(lm[27].x - lm[28].x) > 0.28);
    case "highlow": 
      return (lm[15].y < lm[11].y) || (lm[0].y > 0.58);
    case "jacks": 
      return Math.abs(lm[27].x - lm[28].x) > 0.25;
    case "clap": 
      return Math.abs(lm[15].x - lm[16].x) < 0.12;
    case "freeze": 
      if(!last) return true;
      let m = 0;
      lm.forEach((p, i) => m += Math.abs(p.x - last[i].x) + Math.abs(p.y - last[i].y));
      return m < 0.15;
    default:
      return false;
  }
}

function judgeTiming(){
  const diff = Date.now() - beatWindow;
  if (diff <= 600) return "完美";  // 慢速判定：半秒內都算完美
  if (diff <= 1500) return "良好";
  return "再接再厲";
}

function showRating(text){
  rating.innerText = text;
  rating.style.opacity = 1;
  if(text === "完美") { rating.style.color = "#00FF88"; rating.style.textShadow = "0 0 25px #00FF88"; }
  if(text === "良好") { rating.style.color = "#FFD600"; rating.style.textShadow = "0 0 25px #FFD600"; }
  if(text === "再接再厲") { rating.style.color = "#FF3366"; rating.style.textShadow = "0 0 25px #FF3366"; }
  setTimeout(() => { if(rating.innerText === text) rating.style.opacity = 0; }, 400);
}

function scorePopUp(points){
  const el = document.getElementById("scorePop");
  el.innerText = "+" + points; el.style.opacity = 1;
  el.style.transform = "translate(-50%, -150%)"; 
  setTimeout(() => { el.style.opacity = 0; el.style.transform = "translate(-50%,-50%)"; }, 400);
}

function particles(){
  const gameScreen = document.getElementById("gameScreen");
  for(let i=0; i<15; i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = (window.innerWidth / 2) + "px"; p.style.top = (window.innerHeight / 2) + "px";
    const angle = Math.random() * Math.PI * 2; const distance = 40 + Math.random() * 120;
    p.style.setProperty('--mx', `${Math.cos(angle) * distance}px`);
    p.style.setProperty('--my', `${Math.sin(angle) * distance}px`);
    gameScreen.appendChild(p);
    setTimeout(()=>p.remove(), 600);
  }
}

const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

pose.onResults(r => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(r.image, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  if(r.poseLandmarks){
    const lm = r.poseLandmarks;
    let actionOK = checkPose(lm);

    if(currentAction === "freeze"){
      canvas.classList.add("freeze-effect");
    } else {
      canvas.classList.remove("freeze-effect");
    }

    // 👉 當偵測成功做到動作
    if(actionOK && !beatChecked){
      const result = judgeTiming();
      if(result !== "再接再厲") {
        let earnedPoints = (result === "完美") ? 20 : 10;
        score += earnedPoints;
        scoreText.innerText = "目前得分: " + score;
        beatChecked = true; 
        
        lightUpJoints(); // 💡 動作確認做到：點亮公仔綠燈！
        showRating(result);
        scorePopUp(earnedPoints);
        particles();
      }
    }
    last = lm;
  }
});

function startGame(){
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";

  const cam = new Camera(video,{ onFrame: async () => await pose.send({image:video}), width:640, height:480 });
  cam.start();

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timerPanel").innerText = "剩餘時間: " + timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerInterval); clearInterval(beatInterval); clearInterval(actionInterval); endGame();
    }
  }, 1000);

  changeActionTo(0); // 載入第一個動作
  beatInterval = setInterval(beat, 1500); 
  actionInterval = setInterval(newAction, 6000); // 👉 每 6 秒才換一個動作，慢慢來
}

function endGame(){
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "flex";
  document.getElementById("finalScore").innerText = "熱身運動完成！最終得分：" + score;
  if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
}
</script>
