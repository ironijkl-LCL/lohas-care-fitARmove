<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>FitAR 動活+ | Beat Integrated</title>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; overflow:hidden; }

/* ===== 共用 ===== */
.screen { position:absolute; width:100%; height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; }
#startScreen { background:linear-gradient(#0f2027,#203a43,#2c5364); }

/* ===== UI ===== */
button { padding:20px 40px; margin:10px; font-size:20px; border-radius:30px; border:none; background:#00C2FF; }

canvas { position:absolute; width:100vw; height:100vh; }

#topUI {
  position:absolute; top:20px; right:20px; display:flex; gap:10px;
}
.panel {
  padding:10px 20px;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  font-size:22px;
}

/* ===== 指令 ===== */
#instruction {
  position:absolute;
  top:80px;
  width:100%;
  text-align:center;
  font-size:50px;
  color:#00C2FF;
  animation:pulse 1s infinite alternate;
}
@keyframes pulse {
  from { transform:scale(1);}
  to { transform:scale(1.05);}
}

/* ===== Beat UI ===== */
#beatCircle {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:120px;
  height:120px;
  border:3px solid #00C2FF;
  border-radius:50%;
  opacity:0.4;
}
.pulseBeat {
  animation:beat 0.4s;
}
@keyframes beat {
  from { transform:translate(-50%,-50%) scale(1.3);}
  to { transform:translate(-50%,-50%) scale(1);}
}

/* ===== 評級 ===== */
#rating {
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:80px;
  opacity:0;
}

/* ===== Feedback ===== */
#feedback {
  position:absolute;
  top:50%;
  width:100%;
  text-align:center;
  font-size:150px;
  opacity:0;
}

/* ===== 粒子 ===== */
.particle {
  position:absolute;
  width:8px;
  height:8px;
  background:#00FF88;
  border-radius:50%;
  animation:fly 0.8s forwards;
}
@keyframes fly {
  to {
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* Freeze */
.freeze {
  filter:hue-rotate(180deg);
}

</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>FitAR 動活+</h1>
  <button onclick="startGame(0)">模仿</button>
  <button onclick="startGame(1)">反應</button>
  <button onclick="startGame(2)">Freeze</button>
  <button onclick="startGame(3)">🎵 節奏模式</button>
</div>

<div id="gameScreen" style="display:none;">
  <div id="topUI">
    <div id="score" class="panel">Score:0</div>
  </div>

  <div id="instruction">準備...</div>
  <div id="beatCircle"></div>
  <div id="rating"></div>
  <div id="feedback"></div>

  <video id="video" style="display:none" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let mode=0, score=0;
let currentAction="raise";
let last=null;

let beatTime=0;

// ===== beat =====
function beat(){
  document.getElementById("beatCircle").classList.add("pulseBeat");
  beatTime=Date.now();
  setTimeout(()=>document.getElementById("beatCircle").classList.remove("pulseBeat"),200);
}
setInterval(beat,1000);

// ===== 動作 =====
function newAction(){
  const arr=["raise","jump","run"];
  currentAction=arr[Math.floor(Math.random()*3)];

  if(currentAction==="raise") instruction.innerText="🙌 舉手";
  if(currentAction==="jump") instruction.innerText="🕺 跳";
  if(currentAction==="run") instruction.innerText="🏃 抬腿";
}

// ===== 判斷 =====
function isHandsUp(lm){ return lm[15].y<lm[0].y && lm[16].y<lm[0].y; }
function isJump(lm){ return Math.abs(lm[27].x-lm[28].x)>0.25; }
function isRun(lm){ return Math.abs(lm[25].y-lm[26].y)>0.06; }

function judge(){
  let diff=Date.now()-beatTime;
  if(diff<200) return "PERFECT";
  if(diff<500) return "GOOD";
  return "MISS";
}

// ===== UI =====
function showRating(t){
  const r=document.getElementById("rating");
  r.innerText=t;
  r.style.opacity=1;

  if(t==="PERFECT") r.style.color="#00FF88";
  if(t==="GOOD") r.style.color="#FFD600";
  if(t==="MISS") r.style.color="#FF3366";

  setTimeout(()=>r.style.opacity=0,300);
}

function particles(){
  for(let i=0;i<15;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left="50%";
    p.style.top="50%";

    let x=(Math.random()-0.5)*300+"px";
    let y=(Math.random()-0.5)*300+"px";
    p.style.setProperty("--x",x);
    p.style.setProperty("--y",y);

    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

// ===== Pose =====
const pose=new Pose({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});

pose.onResults(r=>{
  const ctx=canvas.getContext("2d");

  ctx.save();
  ctx.scale(-1,1);
  ctx.drawImage(r.image,-canvas.width,0,canvas.width,canvas.height);
  ctx.restore();

  if(r.poseLandmarks){
    let lm=r.poseLandmarks;
    let ok=false;

    if(currentAction==="raise") ok=isHandsUp(lm);
    if(currentAction==="jump") ok=isJump(lm);
    if(currentAction==="run") ok=isRun(lm);

    if(mode===3){
      if(ok){
        let res=judge();
        showRating(res);

        if(res==="PERFECT") score+=20;
        if(res==="GOOD") score+=10;

        particles();
      }
    } else {
      if(ok){
        score+=10;
      }
    }

    document.getElementById("score").innerText="Score:"+score;
    last=lm;
  }
});

// ===== start =====
function startGame(m){
  mode=m;
  document.getElementById("startScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";

  const cam=new Camera(video,{
    onFrame:async()=>await pose.send({image:video}),
    width:640,height:480
  });
  cam.start();

  setInterval(newAction,3000);
}
</script>

</body>
</html>
