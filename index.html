<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>FitAR 動活+ | FitAR Move+</title>

<style>
body {
  margin:0;
  font-family: 'Microsoft JhengHei', 'Heiti TC', sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* ===== 共用畫面 ===== */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index: 10;
}

#startScreen {
  background:linear-gradient(#0f2027,#203a43,#2c5364);
  overflow-y: auto;
  padding: 20px 0;
}

#startScreen h1 {
  font-size: 60px;
  margin-bottom: 5px;
  text-shadow: 0 0 15px #00C2FF;
}

#startScreen h2 {
  font-size: 32px;
  color: #00C2FF;
  margin-top: 0;
  margin-bottom: 25px;
  font-weight: bold;
}

/* 區塊標題 */
.section-title {
  font-size: 28px;
  color: #FFF;
  margin: 15px 0 10px 0;
  font-weight: bold;
  text-shadow: 0 0 5px rgba(255,255,255,0.5);
}

/* 選擇按鈕組 */
.option-group {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 25px;
}

.opt-btn {
  padding: 15px 35px;
  border: 3px solid rgba(255,255,255,0.4);
  border-radius: 40px;
  font-size: 24px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  color: white;
  font-weight: bold;
  transition: all 0.2s;
  min-width: 160px;
}
.opt-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.03);
}
/* 被選中的按鈕樣式 */
.opt-btn.active {
  background: #00d4ff !important;
  color: black !important;
  border-color: #fff !important;
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
}

/* 特大號開始遊戲按鈕 */
.start-game-btn {
  padding: 22px 60px;
  border: 4px solid #fff;
  border-radius: 50px;
  font-size: 32px;
  cursor: pointer;
  background: #00FF88;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
  transition: all 0.2s;
  width: 400px;
  text-align: center;
  margin-top: 15px;
}
.start-game-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0, 255, 136, 0.8);
}

/* ===== 遊戲畫面 ===== */
#gameScreen {
  display:none;
  position: relative;
  width: 100vw;
  height: 100vh;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* 右上方特大 UI 面板 */
#topUI {
  position:absolute;
  top:20px;
  right:30px;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel {
  padding: 15px 40px;
  border-radius: 25px;
  background: rgba(0,0,0,0.85);
  font-size: 34px;
  font-weight: bold;
  border: 3px solid rgba(255,255,255,0.4);
  text-align: right;
  min-width: 240px;
}

#speedPanel { color: #00d4ff; border-color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
#timerPanel { color: #FF3366; border-color: #FF3366; text-shadow: 0 0 10px #FF3366; }

/* 頂部大標題 */
#stageTitle {
  position: absolute;
  top: 25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 45px;
  font-weight: 900;
  color: #FFF;
  text-shadow: 0 0 15px #00C2FF;
  z-index: 5;
  letter-spacing: 3px;
}

/* 動作提示字 */
#instruction-box {
  position: absolute;
  top: 110px;
  width: 100%;
  text-align: center;
  z-index: 5;
}

#instruction {
  display: inline-block;
  padding: 20px 50px;
  background: rgba(0, 0, 0, 0.85);
  border-radius: 40px;
  border: 4px solid #00d4ff;
  font-size: 50px;
  color: #fff;
  font-weight: 900;
  text-shadow: 0 0 15px #00d4ff;
  letter-spacing: 2px;
}

.speed-tip {
  color: #FFD600;
  text-shadow: 0 0 10px #FFD600;
}

/* 100% 顯現的特大純色塊公仔組（女孩+男孩） */
#coachContainer {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: 80px;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
}

.avatar-coach {
  width: 340px;
  height: 400px;
}

/* 人體關節藍點 */
.joint-dot {
  fill: #00E5FF;
  stroke: #fff;
  stroke-width: 1.5;
  transition: fill 0.2s, r 0.2s;
}

/* 確認做到時，藍點變大、變綠、發光 */
.joint-success {
  fill: #00FF88 !important;
  r: 5.5px !important;
  filter: drop-shadow(0 0 10px #00FF88);
}

/* 音樂節奏縮放效果圈圈（音遊感） */
#musicPulseRing {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  width: 250px;
  height: 250px;
  border: 4px solid rgba(0, 194, 255, 0.4);
  border-radius: 50%;
  z-index: 3;
  pointer-events: none;
  opacity: 0;
}
.ring-pulse {
  animation: ringExpand 0.4s ease-out;
}
@keyframes ringExpand {
  0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
  100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
}

/* 評級反饋 */
#rating {
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  font-size: 130px;
  font-weight: 900;
  letter-spacing: 6px;
  opacity:0;
  z-index: 10;
  pointer-events: none;
}

/* 分數浮字 */
#scorePop {
  position:absolute;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size: 80px;
  color:#FFD600;
  font-weight: 900;
  text-shadow: 0 0 15px #FFD600;
  opacity:0;
  z-index: 8;
  transition: transform 0.4s ease-out, opacity 0.4s ease-out;
  pointer-events: none;
}

.particle {
  position:absolute;
  width:12px;
  height:12px;
  background:#00FF88;
  border-radius:50%;
  z-index: 6;
  pointer-events: none;
  animation: particleMove 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes particleMove { to { transform: translate(var(--mx), var(--my)); opacity:0; } }

.freeze-effect { filter: hue-rotate(180deg) brightness(1.3) contrast(1.2); }
#endScreen { display:none; background:#111; }
#finalScore { font-size: 65px; margin-bottom: 40px; }
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>FitAR 動活+</h1>
  <h2>請設定您的運動計畫 🎵</h2>
  
  <div class="section-title">第一步：選擇動作速度</div>
  <div class="option-group">
    <button class="opt-btn active" id="spd-slow" onclick="selectSpeed('slow')">慢速</button>
    <button class="opt-btn" id="spd-medium" onclick="selectSpeed('medium')">中速</button>
    <button class="opt-btn" id="spd-normal" onclick="selectSpeed('normal')">正常</button>
  </div>

  <div class="section-title">第二步：選擇運動時間</div>
  <div class="option-group">
    <button class="opt-btn" id="time-30" onclick="selectTime(30)">30 秒</button>
    <button class="opt-btn active" id="time-60" onclick="selectTime(60)">60 秒</button>
    <button class="opt-btn" id="time-120" onclick="selectTime(120)">120 秒</button>
  </div>

  <button class="start-game-btn" onclick="startGame()">開始運動挑戰 ➔</button>
</div>

<div id="gameScreen">
  <div id="stageTitle">全身體能挑戰</div>

  <div id="topUI">
    <div id="speedPanel" class="panel">速度：慢速</div>
    <div id="score" class="panel">目前得分: 0</div>
    <div id="timerPanel" class="panel">剩餘時間: 60</div>
  </div>

  <div id="instruction-box">
    <div id="instruction"><span id="prefix-text" class="speed-tip">慢慢做：</span>準備中...</div>
  </div>

  <div id="musicPulseRing"></div>

  <div id="coachContainer">
    <svg class="avatar-coach" id="girlCoach" viewBox="0 0 100 120">
      <path d="M25,25 C10,20 5,45 20,50 C15,35 20,28 25,25 Z" fill="#4A2711" />
      <path id="girlLeftArm" d="M32,55 C20,35 22,20 28,10 C32,20 30,40 35,55 Z" fill="#FFD1A9" />
      <path id="girlRightArm" d="M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z" fill="#FFD1A9" />
      <path d="M35,55 L65,55 L60,85 L40,85 Z" fill="#00E5FF" />
      <circle cx="50" cy="40" r="18" fill="#FFD1A9" />
      <path d="M32,35 C32,20 68,20 68,35 C68,22 32,22 32,35 Z" fill="#4A2711" />
      <circle cx="44" cy="38" r="2.5" fill="#000" />
      <circle cx="56" cy="38" r="2.5" fill="#000" />
      <path d="M46,48 Q50,52 54,48" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" />
      <path d="M40,85 L60,85 L62,98 L51,98 L50,88 L49,98 L38,98 Z" fill="#007A8A" />
      <rect x="41" y="98" width="6" height="12" rx="3" fill="#FFD1A9" />
      <rect x="53" y="98" width="6" height="12" rx="3" fill="#FFD1A9" />
      <path d="M39,110 H48 V115 H39 Z" fill="#00E5FF" />

      <circle id="g_lh" class="joint-dot" cx="28" cy="10" r="3.5" />

      <circle id="g_rk" class="joint-dot" cx="56" cy="104" r="3.5" />
    </svg>

    <svg class="avatar-coach" id="boyCoach" viewBox="0 0 100 120">
      <path id="boyLeftArm" d="M32,55 C20,35 22,20 28,10 C32,20 30,40 35,55 Z" fill="#FFD1A9" />
      <path id="boyRightArm" d="M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z" fill="#FFD1A9" />
      <path d="M35,55 L65,55 L60,85 L40,85 Z" fill="#FF6D00" />
      <circle cx="50" cy="40" r="18" fill="#FFD1A9" />
      <path d="M31,32 C30,15 45,10 50,18 C55,10 70,15 69,32 C72,25 28,25 31,32 Z" fill="#6d4c41" />
      <circle cx="44" cy="39" r="2.5" fill="#000" />
      <circle cx="56" cy="39" r="2.5" fill="#000" />
      <path d="M45,49 Q50,53 55,49" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" />
      <path d="M40,85 L60,85 L62,98 L51,98 L50,88 L49,98 L38,98 Z" fill="#29B6F6" />
      <rect x="41" y="98" width="6" height="12" rx="3" fill="#FFD1A9" />
      <rect x="53" y="98" width="6" height="12" rx="3" fill="#FFD1A9" />
      <path d="M39,110 H48 V115 H39 Z" fill="#FF6D00" />
      <path d="M52,110 H61 V115 H52 Z" fill="#FF6D00" />
      
      <circle id="b_lh" class="joint-dot" cx="28" cy="10" r="3.5" />
      <circle id="b_rh" class="joint-dot" cx="72" cy="10" r="3.5" />
      <circle id="b_lk" class="joint-dot" cx="44" cy="104" r="3.5" />
      <circle id="b_rk" class="joint-dot" cx="56" cy="104" r="3.5" />
    </svg>
  </div>

  <div id="rating"></div>
  <div id="scorePop">+20</div>

  <video id="video" style="display:none;" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="endScreen" class="screen">
  <h1 id="finalScore"></h1>
  <button class="start-game-btn" onclick="location.reload()">再玩一次</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let score = 0, timeLeft = 60, speedMode = 'slow', actionDuration = 6000;
let last = null, beatWindow = 0, beatChecked = false;
let currentAction = "reach", currentActionIndex = 0;
let beatInterval, actionInterval, timerInterval;

// 內建 Web Audio API 音樂合成器系統
let audioCtx = null;

// 12 大核心動作清單
const actionsList = [
  "reach", "run", "knees", "star", 
  "highlow", "rolls", "jacks", "clap", 
  "sidebend", "lunge", "twist", "freeze"
];

const instruction = document.getElementById("instruction");
const scoreText = document.getElementById("score");
const rating = document.getElementById("rating");

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function selectSpeed(mode) {
  speedMode = mode;
  document.querySelectorAll('[id^="spd-"]').forEach(btn => btn.classList.remove('active'));
  document.getElementById('spd-' + mode).classList.add('active');
}

function selectTime(seconds) {
  timeLeft = seconds;
  document.querySelectorAll('[id^="time-"]').forEach(btn => btn.classList.remove('active'));
  document.getElementById('time-' + seconds).classList.add('active');
}

// 核心音效與音樂拍點自主合成引擎
function playBeatSound() {
  if (!audioCtx) return;
  
  // 1. 合成重低音大鼓 (Bass Drum)
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.frequency.setValueAtTime(120, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  
  gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);

  // 2. 合成節奏和弦電子樂 (Synth Chord Progression)
  let notes = [261.63, 329.63, 392.00]; // 預設 C Major 和弦
  if (currentActionIndex % 3 === 1) notes = [293.66, 349.23, 440.00]; // D Minor
  if (currentActionIndex % 3 === 2) notes = [349.23, 440.00, 523.25]; // F Major
  
  notes.forEach(freq => {
    let synOsc = audioCtx.createOscillator();
    let synGain = audioCtx.createGain();
    synOsc.type = 'triangle';
    synOsc.connect(synGain);
    synGain.connect(audioCtx.destination);
    
    synOsc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    synGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    synGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
    
    synOsc.start();
    synOsc.stop(audioCtx.currentTime + 0.6);
  });
}

function beat(){
  // 播放與音樂完全同步的實時重低音與和弦節拍
  playBeatSound();

  // 觸發音遊擴散環視覺特效
  const ring = document.getElementById("musicPulseRing");
  ring.classList.remove("ring-pulse");
  void ring.offsetWidth; 
  ring.classList.add("ring-pulse");

  if (!beatChecked && beatWindow > 0) {
    showRating("加油！再試試");
  }
  beatWindow = Date.now();
  beatChecked = false;
  resetJointDots(); 
}

// 變更 12 大核心動作與公仔肢體姿勢
function changeActionTo(index) {
  currentActionIndex = index;
  currentAction = actionsList[index];
  beatChecked = false;
  resetJointDots();

  const gLeft = document.getElementById("girlLeftArm");
  const gRight = document.getElementById("girlRightArm");
  const bLeft = document.getElementById("boyLeftArm");
  const bRight = document.getElementById("boyRightArm");
  const dots = ["g_lh", "g_rh", "b_lh", "b_rh"];

  if(currentAction === "reach") {
    setUI("雙手高舉過頭 🙌"); setArmsUp(gLeft, gRight, bLeft, bRight, dots, 10);
  }
  else if(currentAction === "run") {
    setUI("原地輕鬆踏步 🏃"); setArmsDown(gLeft, gRight, bLeft, bRight, dots);
  }
  else if(currentAction === "knees") {
    setUI("慢速交替高抬腿 ⚡"); setArmsDown(gLeft, gRight, bLeft, bRight, dots);
  }
  else if(currentAction === "star") {
    setUI("雙手雙腳左右大張開 ⭐"); setArmsOut(gLeft, gRight, bLeft, bRight, dots);
  }
  else if(currentAction === "highlow") {
    setUI("向上摸天、向下微蹲 ↕"); setArmsUp(gLeft, gRight, bLeft, bRight, dots, 10);
  }
  else if(currentAction === "rolls") {
    setUI("前後緩慢轉動雙肩 🔄"); setArmsDown(gLeft, gRight, bLeft, bRight, dots);
  }
  else if(currentAction === "jacks") {
    setUI("雙腳張開、雙手平舉 🕺"); setArmsOut(gLeft, gRight, bLeft, bRight, dots);
  }
  else if(currentAction === "clap") {
    setUI("雙手向胸前靠攏擊掌 👏");
    gLeft.setAttribute("d", "M35,55 C35,45 42,40 45,45 C42,55 38,55 35,55 Z");
    gRight.setAttribute("d", "M65,55 C65,45 58,40 55,45 C58,55 62,55 65,55 Z");
    bLeft.setAttribute("d", "M35,55 C35,45 42,40 45,45 C42,55 38,55 35,55 Z");
    bRight.setAttribute("d", "M65,55 C65,45 58,40 55,45 C58,55 62,55 65,55 Z");
    dsUpdate(45, 55);
  }
  else if(currentAction === "sidebend") {
    setUI("身體往左斜側彎 🧘");
    gLeft.setAttribute("d", "M35,55 C20,45 15,35 20,25 C25,35 30,45 35,55 Z");
    gRight.setAttribute("d", "M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z");
    bLeft.setAttribute("d", "M35,55 C20,45 15,35 20,25 C25,35 30,45 35,55 Z");
    brUpdateUp(10);
    updateDotPos("g_lh", 20, 25); updateDotPos("g_rh", 72, 10);
    updateDotPos("b_lh", 20, 25); updateDotPos("b_rh", 72, 10);
  }
  else if(currentAction === "lunge") {
    setUI("雙腳前後大跨弓步 🦵"); setArmsDown(gLeft, gRight, bLeft, bRight, dots);
  }
  else if(currentAction === "twist") {
    setUI("雙手平舉，左右轉腰 🔄"); setArmsOut(gLeft, gRight, bLeft, bRight, dots);
  }
  else if(currentAction === "freeze") {
    setUI("全身定格，保持不動 ❄"); setArmsUp(gLeft, gRight, bLeft, bRight, dots, 20);
  }
}

function setUI(text) {
  const prefix = { 'slow': '慢慢做：', 'medium': '跟著做：', 'normal': '快節奏：' }[speedMode];
  document.getElementById("prefix-text").innerText = prefix;
  instruction.innerHTML = `<span id="prefix-text" class="speed-tip">${prefix}</span>${text}`;
}

function setArmsUp(gl, gr, bl, br, ds, y) {
  gl.setAttribute("d", `M32,55 C20,35 22,20 28,${y} C32,20 30,40 35,55 Z`);
  gr.setAttribute("d", `M68,55 C80,35 78,20 72,${y} C68,20 70,40 65,55 Z`);
  bl.setAttribute("d", `M32,55 C20,35 22,20 28,${y} C32,20 30,40 35,55 Z`);
  br.setAttribute("d", `M68,55 C80,35 78,20 72,${y} C68,20 70,40 65,55 Z`);
  ds.forEach((id, i) => updateDotPos(id, i%2===0 ? 28 : 72, y));
}
function setArmsDown(gl, gr, bl, br, ds) {
  gl.setAttribute("d", "M35,55 C25,65 22,75 25,85 C30,75 32,65 35,55 Z");
  gr.setAttribute("d", "M65,55 C75,65 78,75 75,85 C70,75 68,65 65,55 Z");
  bl.setAttribute("d", "M35,55 C25,65 22,75 25,85 C30,75 32,65 35,55 Z");
  br.setAttribute("d", "M65,55 C75,65 78,75 75,85 C70,75 68,65 65,55 Z");
  ds.forEach((id, i) => updateDotPos(id, i%2===0 ? 25 : 75, 85));
}
function setArmsOut(gl, gr, bl, br, ds) {
  gl.setAttribute("d", "M35,55 C15,50 10,45 5,45 C10,55 20,58 35,55 Z");
  gr.setAttribute("d", "M65,55 C85,50 90,45 95,45 C90,55 80,58 65,55 Z");
  bl.setAttribute("d", "M35,55 C15,50 10,45 5,45 C10,55 20,58 35,55 Z");
  br.setAttribute("d", "M65,55 C85,50 90,45 95,45 C90,55 80,58 65,55 Z");
  ds.forEach((id, i) => updateDotPos(id, i%2===0 ? 5 : 95, 45));
}
function dsUpdate(x1, x2) {
  updateDotPos("g_lh", x1, 45); updateDotPos("g_rh", x2, 45);
  updateDotPos("b_lh", x1, 45); updateDotPos("b_rh", x2, 45);
}
function brUpdateUp(y) {
  document.getElementById("boyRightArm").setAttribute("d", `M68,55 C80,35 78,20 72,${y} C68,20 70,40 65,55 Z`);
}
function updateDotPos(id, x, y) {
  const el = document.getElementById(id);
  if(el) { el.setAttribute("cx", x); el.setAttribute("cy", y); }
}

function resetJointDots() {
  document.querySelectorAll('.joint-dot').forEach(dot => dot.classList.remove('joint-success'));
}

function lightUpJoints() {
  let targets = [];
  if(["reach", "highlow", "sidebend", "freeze"].includes(currentAction)) targets = ["g_lh", "g_rh", "b_lh", "b_rh"];
  if(["run", "knees", "lunge"].includes(currentAction)) targets = ["g_lk", "g_rk", "b_lk", "b_rk"];
  if(["star", "jacks", "clap", "rolls", "twist"].includes(currentAction)) targets = ["g_lh", "g_rh", "b_lh", "b_rh"];
  
  targets.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.add('joint-success');
  });
}

function newAction(){
  let nextIndex = (currentActionIndex + 1) % actionsList.length;
  changeActionTo(nextIndex);
}

// ===== 核心 12 大動作 AI 骨架判定演算法 =====
function checkPose(lm) {
  switch(currentAction) {
    case "reach": return lm[15].y < lm[0].y && lm[16].y < lm[0].y;
    case "run": return Math.abs(lm[25].y - lm[26].y) > 0.04;
    case "knees": return lm[25].y < lm[23].y || lm[26].y < lm[24].y;
    case "star": return (lm[15].y < lm[0].y && lm[16].y < lm[0].y) && (Math.abs(lm[27].x - lm[28].x) > 0.28);
    case "highlow": return (lm[15].y < lm[11].y) || (lm[0].y > 0.58);
    case "rolls": if(!last) return false; return Math.abs(lm[11].y - last[11].y) > 0.015;
    case "jacks": return Math.abs(lm[27].x - lm[28].x) > 0.25;
    case "clap": return Math.abs(lm[15].x - lm[16].x) < 0.12;
    case "sidebend": return lm[15].y < lm[11].y && lm[16].x < lm[12].x;
    case "lunge": return Math.abs(lm[27].x - lm[28].x) > 0.35;
    case "twist": if(!last) return false; return Math.abs(lm[11].x - last[11].x) > 0.02;
    case "freeze": 
      if(!last) return true;
      let m = 0;
      lm.forEach((p, i) => m += Math.abs(p.x - last[i].x) + Math.abs(p.y - last[i].y));
      return m < 0.15;
    default: return false;
  }
}

function judgeTiming(){
  const diff = Date.now() - beatWindow;
  let maxPerf = (speedMode === 'slow') ? 600 : (speedMode === 'medium' ? 450 : 300);
  if (diff <= maxPerf) return "完美";
  if (diff <= maxPerf * 2) return "良好";
  return "再接再厲";
}

function showRating(text){
  rating.innerText = text;
  rating.style.opacity = 1;
  if(text === "完美") { rating.style.color = "#00FF88"; rating.style.textShadow = "0 0 25px #00FF88"; }
  if(text === "良好") { rating.style.color = "#FFD600"; rating.style.textShadow = "0 0 25px #FFD600"; }
  if(text === "再接再厲") { rating.style.color = "#FF3366"; rating.style.textShadow = "0 0 25px #FF3366"; }
  setTimeout(() => { if(rating.innerText === text) rating.style.opacity = 0; }, 400);
}

function scorePopUp(points){
  const el = document.getElementById("scorePop");
  el.innerText = "+" + points; el.style.opacity = 1;
  el.style.transform = "translate(-50%, -150%)"; 
  setTimeout(() => { el.style.opacity = 0; el.style.transform = "translate(-50%,-50%)"; }, 400);
}

function particles(){
  const gameScreen = document.getElementById("gameScreen");
  for(let i=0; i<15; i++){
    const p = document.createElement("div"); p.className = "particle";
    p.style.left = (window.innerWidth / 2) + "px"; p.style.top = (window.innerHeight / 2) + "px";
    const angle = Math.random() * Math.PI * 2; const distance = 40 + Math.random() * 120;
    p.style.setProperty('--mx', `${Math.cos(angle) * distance}px`);
    p.style.setProperty('--my', `${Math.sin(angle) * distance}px`);
    gameScreen.appendChild(p);
    setTimeout(()=>p.remove(), 600);
  }
}

const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

pose.onResults(r => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(r.image, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  if(r.poseLandmarks){
    const lm = r.poseLandmarks;
    let actionOK = checkPose(lm);

    if(currentAction === "freeze") canvas.classList.add("freeze-effect");
    else canvas.classList.remove("freeze-effect");

    if(actionOK && !beatChecked){
      const result = judgeTiming();
      if(result !== "再接再厲") {
        let earnedPoints = (result === "完美") ? 20 : 10;
        score += earnedPoints;
        scoreText.innerText = "目前得分: " + score;
        beatChecked = true; 
        
        lightUpJoints(); 
        showRating(result);
        scorePopUp(earnedPoints);
        particles();
        
        // 成功踩中節拍時，播放高音反饋特效聲
        if(audioCtx) {
          let hitOsc = audioCtx.createOscillator();
          let hitGain = audioCtx.createGain();
          hitOsc.type = 'sine';
          hitOsc.frequency.setValueAtTime(result === "完美" ? 523.25 : 392.00, audioCtx.currentTime);
          hitOsc.connect(hitGain);
          hitGain.connect(audioCtx.destination);
          hitGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          hitGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
          hitOsc.start(); hitOsc.stop(audioCtx.currentTime + 0.15);
        }
      }
    }
    last = lm;
  }
});

function startGame(){
  // 初始化自主音訊合成環境 (解鎖瀏覽器音訊限制)
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  let beatIntervalTime = 1000; // 預設 1 秒一拍 (60 BPM)

  if (speedMode === 'slow') {
    actionDuration = 6000;
    beatIntervalTime = 1500; // 慢速：1.5秒一拍 (40 BPM)，超平緩
    document.getElementById("speedPanel").innerText = "速度：慢速";
  } else if (speedMode === 'medium') {
    actionDuration = 4000;
    beatIntervalTime = 1000; // 中速：1.0秒一拍 (60 BPM)
    document.getElementById("speedPanel").innerText = "速度：中速";
  } else if (speedMode === 'normal') {
    actionDuration = 2500;
    beatIntervalTime = 625;  // 正常速：0.625秒一拍 (96 BPM)，動感有勁
    document.getElementById("speedPanel").innerText = "速度：正常速";
  }

  document.getElementById("timerPanel").innerText = "剩餘時間: " + timeLeft;
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";

  const cam = new Camera(video,{ onFrame: async () => await pose.send({image:video}), width:640, height:480 });
  cam.start();

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timerPanel").innerText = "剩餘時間: " + timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerInterval); clearInterval(beatInterval); clearInterval(actionInterval); endGame();
    }
  }, 1000);

  changeActionTo(0); 
  beatInterval = setInterval(beat, beatIntervalTime); 
  actionInterval = setInterval(newAction, actionDuration); 
}

function endGame(){
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "flex";
  document.getElementById("finalScore").innerText = "運動挑戰完成！最終得分：" + score;
  if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
  if(audioCtx) audioCtx.close();
}
</script>
