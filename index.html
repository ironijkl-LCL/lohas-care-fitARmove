<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>FitAR 動活+ | 智慧 AI 辨識與視覺提示升級版</title>

<style>
body {
  margin:0;
  font-family: 'Microsoft JhengHei', 'Heiti TC', sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* ===== 共用畫面 ===== */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index: 10;
}

#startScreen {
  background:linear-gradient(#0f2027,#203a43,#2c5364);
  overflow-y: auto;
  padding: 20px 0;
}

#startScreen h1 {
  font-size: 60px;
  margin-bottom: 5px;
  text-shadow: 0 0 15px #00C2FF;
}

#startScreen h2 {
  font-size: 32px;
  color: #00C2FF;
  margin-top: 0;
  margin-bottom: 25px;
  font-weight: bold;
}

.section-title {
  font-size: 26px;
  color: #FFF;
  margin: 15px 0 10px 0;
  font-weight: bold;
  text-shadow: 0 0 5px rgba(255,255,255,0.5);
}

.option-group {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}

/* 長者大按鈕 */
.opt-btn {
  padding: 15px 35px;
  border: 3px solid rgba(255,255,255,0.4);
  border-radius: 40px;
  font-size: 24px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  color: white;
  font-weight: bold;
  transition: all 0.2s;
  min-width: 160px;
}
.opt-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.03);
}
.opt-btn.active {
  background: #00d4ff !important;
  color: black !important;
  border-color: #fff !important;
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
}

#lv-1.active { background: #00FF88 !important; box-shadow: 0 0 20px rgba(0, 255, 136, 0.6); }
#lv-2.active { background: #00d4ff !important; box-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }
#lv-3.active { background: #FFD600 !important; box-shadow: 0 0 20px rgba(255, 214, 0, 0.6); }
#lv-4.active { background: #FF3366 !important; box-shadow: 0 0 20px rgba(255, 51, 102, 0.6); }

.start-game-btn {
  padding: 22px 60px;
  border: 4px solid #fff;
  border-radius: 50px;
  font-size: 32px;
  cursor: pointer;
  background: #FFD600; 
  color: black;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(255, 214, 0, 0.5);
  transition: all 0.2s;
  width: 420px;
  text-align: center;
  margin-top: 15px;
}

/* ===== 遊戲畫面 ===== */
#gameScreen {
  display:none;
  position: relative;
  width: 100vw;
  height: 100vh;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  transform: scaleX(-1);
}

#topUI {
  position:absolute;
  top:20px;
  right:30px;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel {
  padding: 12px 35px;
  border-radius: 25px;
  background: rgba(0,0,0,0.85);
  font-size: 30px;
  font-weight: bold;
  border: 3px solid rgba(255,255,255,0.4);
  text-align: right;
  min-width: 260px;
}

#modePanel { color: #00FF88; border-color: #00FF88; }
#scorePanel { color: #FFD600; border-color: #FFD600; }
#comboPanel { color: #00d4ff; border-color: #00d4ff; display: none; }
#timerPanel { color: #FF3366; border-color: #FF3366; }

#instruction-box {
  position: absolute;
  top: 90px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 5;
}

#instruction-container {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 15px 40px;
  background: rgba(0, 0, 0, 0.9);
  border-radius: 40px;
  border: 4px solid #00d4ff;
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
}

#visual-icon-box {
  width: 80px;
  height: 80px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

#instruction-text {
  font-size: 42px;
  color: #fff;
  font-weight: 900;
  text-shadow: 0 0 15px #00d4ff;
  letter-spacing: 2px;
}

.distract-border {
  border-color: #FF3366 !important;
  box-shadow: 0 0 30px #FF3366 !important;
  animation: shakeUI 0.3s infinite;
}

@keyframes shakeUI {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

.speed-tip { color: #FFD600; text-shadow: 0 0 10px #FFD600; }

/* ===== 🤖 專業真人比例科技感教練核心樣式 ===== */
#coachContainer {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: 100px;
  filter: drop-shadow(0 0 30px rgba(0, 194, 255, 0.4));
}

.avatar-coach { 
  width: 360px; 
  height: 480px; /* 拉高畫布，給予 7.5 頭身真人比例解算空間 */
}

/* 讓肌肉、骨骼路徑在切換時產生流暢的真人肢體補間動畫 */
.avatar-coach path, .avatar-coach polygon, .avatar-coach ellipse {
  transition: d 0.38s cubic-bezier(0.4, 0, 0.2, 1), fill 0.3s, stroke 0.3s;
}

/* 關節點節拍核心提示 */
.joint-dot { 
  fill: #000; 
  stroke: #00E5FF; 
  stroke-width: 2.5;
  r: 5px;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* 動作完成時，核心關節點產生高階量子光暈爆炸效果 */
.joint-success { 
  fill: #00FF88 !important; 
  stroke: #FFF !important;
  stroke-width: 3px !important;
  r: 9px !important; 
  filter: drop-shadow(0 0 12px #00FF88) drop-shadow(0 0 4px #FFF);
}

#musicPulseRing {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  width: 250px;
  height: 250px;
  border: 4px solid rgba(0, 194, 255, 0.4);
  border-radius: 50%;
  z-index: 3;
  pointer-events: none;
  opacity: 0;
}
.ring-pulse { animation: ringExpand 0.4s ease-out; }
@keyframes ringExpand {
  0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
  100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
}

#rating { position:absolute; top:45%; width:100%; text-align:center; font-size: 130px; font-weight: 900; opacity:0; z-index: 10; pointer-events: none; }
#scorePop { position:absolute; top:58%; left:50%; transform:translate(-50%,-50%); font-size: 80px; color:#FFD600; font-weight: 900; opacity:0; z-index: 8; pointer-events: none; }
.particle { position:absolute; width:12px; height:12px; background:#00FF88; border-radius:50%; z-index: 6; pointer-events: none; animation: particleMove 0.7s forwards; }
@keyframes particleMove { to { transform: translate(var(--mx), var(--my)); opacity:0; } }

#endScreen { display:none; background:#111; }
#finalScore { font-size: 55px; margin-bottom: 20px; text-align: center; line-height: 1.5; }
#performanceReview { font-size: 32px; color: #00C2FF; margin-bottom: 40px; font-weight: bold; text-align: center; }

.freeze-effect {
  filter: saturate(0.5) hue-rotate(180deg) brightness(1.2);
  transition: filter 0.3s;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>FitAR 動活+</h1>
  <h2>AI 辨識核心與高對比提示版 🎵</h2>
  
  <div class="section-title">第一步：選擇訓練模式</div>
  <div class="option-group">
    <button class="opt-btn active" id="md-imitate" onclick="selectMode('imitate')">模仿模式</button>
    <button class="opt-btn" id="md-react" onclick="selectMode('react')">反應模式</button>
    <button class="opt-btn" id="md-freeze" onclick="selectMode('freeze')">定格模式</button>
  </div>

  <div class="section-title">第二步：選擇關卡難度 (認知容錯調節)</div>
  <div class="option-group">
    <button class="opt-btn active" id="lv-1" onclick="selectLevel(1)">Lv.1 初級</button>
    <button class="opt-btn" id="lv-2" onclick="selectLevel(2)">Lv.2 基礎</button>
    <button class="opt-btn" id="lv-3" onclick="selectLevel(3)">Lv.3 進階</button>
    <button class="opt-btn" id="lv-4" onclick="selectLevel(4)">Lv.4 挑戰</button>
  </div>

  <div class="section-title">第三步：選擇運動時間</div>
  <div class="option-group">
    <button class="opt-btn" id="time-30" onclick="selectTime(30)">30 秒</button>
    <button class="opt-btn active" id="time-60" onclick="selectTime(60)">60 秒</button>
    <button class="opt-btn" id="time-120" onclick="selectTime(120)">120 秒</button>
  </div>

  <button class="start-game-btn" onclick="startGame()">建立關卡並開始 ➔</button>
</div>

<div id="gameScreen">
  <div id="topUI">
    <div id="modePanel" class="panel">模式：模仿模式</div>
    <div id="scorePanel" class="panel">目前得分: 0</div>
    <div id="comboPanel" class="panel">連擊: 0 🔥</div>
    <div id="timerPanel" class="panel">剩餘時間: 60</div>
  </div>

  <div id="instruction-box">
    <div id="instruction-container">
      <div id="visual-icon-box">
        <svg id="visual-svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#FFD600" stroke-width="3"></svg>
      </div>
      <div id="instruction-text">讀取鏡頭中...</div>
    </div>
  </div>

  <div id="musicPulseRing"></div>

  <div id="coachContainer">
    <svg class="avatar-coach" id="girlCoach" viewBox="0 0 120 160">
      <defs>
        <linearGradient id="gTorsoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#185a9d" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#4ca1af" stop-opacity="0.85"/>
        </linearGradient>
        <linearGradient id="gLimbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#00FF88"/>
          <stop offset="100%" stop-color="#00b4db"/>
        </linearGradient>
        <radialGradient id="headGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00FF88" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#00b4db" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <ellipse cx="60" cy="20" rx="9" ry="12" fill="none" stroke="#00FF88" stroke-width="2"/>
      <circle cx="60" cy="20" r="5" fill="url(#headGlow)"/>
      <path id="girlTorso" d="M44,38 L76,38 L70,82 L50,82 Z" fill="url(#gTorsoGrad)" stroke="#00FF88" stroke-width="1.5" />
      <path id="girlLeftArm" d="M44,38 L30,58 L24,80" fill="none" stroke="url(#gLimbGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path id="girlRightArm" d="M76,38 L90,58 L96,80" fill="none" stroke="url(#gLimbGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path id="girlLeftLeg" d="M50,82 L42,114 L46,148" fill="none" stroke="#00b4db" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path id="girlRightLeg" d="M70,82 L78,114 L74,148" fill="none" stroke="#00b4db" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle id="g_lh" class="joint-dot" cx="24" cy="80" />
      <circle id="g_rh" class="joint-dot" cx="96" cy="80" />
      <circle id="g_lk" class="joint-dot" cx="42" cy="114" />
      <circle id="g_rk" class="joint-dot" cx="78" cy="114" />
    </svg>

    <svg class="avatar-coach" id="boyCoach" viewBox="0 0 120 160">
      <defs>
        <linearGradient id="bTorsoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f857a6" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#ff5858" stop-opacity="0.85"/>
        </linearGradient>
        <linearGradient id="bLimbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFD600"/>
          <stop offset="100%" stop-color="#FF3366"/>
        </linearGradient>
      </defs>
      <ellipse cx="60" cy="20" rx="9" ry="12" fill="none" stroke="#FF5858" stroke-width="2"/>
      <circle cx="60" cy="20" r="5" fill="#FF3366" opacity="0.3"/>
      <path id="boyTorso" d="M40,36 L80,36 L72,82 L48,82 Z" fill="url(#bTorsoGrad)" stroke="#FF3366" stroke-width="1.5" />
      <path id="boyLeftArm" d="M40,36 L26,58 L20,80" fill="none" stroke="url(#bLimbGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path id="boyRightArm" d="M80,36 L94,58 L100,80" fill="none" stroke="url(#bLimbGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path id="boyLeftLeg" d="M48,82 L42,114 L46,148" fill="none" stroke="#00b4db" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path id="boyRightLeg" d="M72,82 L78,114 L74,148" fill="none" stroke="#00b4db" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle id="b_lh" class="joint-dot" cx="20" cy="80" />
      <circle id="b_rh" class="joint-dot" cx="100" cy="80" />
      <circle id="b_lk" class="joint-dot" cx="42" cy="114" />
      <circle id="b_rk" class="joint-dot" cx="78" cy="114" />
    </svg>
  </div>

  <div id="rating"></div>
  <div id="scorePop">+20</div>

  <video id="video" style="display:none;" playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div id="endScreen" class="screen">
  <h1 id="finalScore"></h1>
  <div id="performanceReview"></div>
  <button class="start-game-btn" onclick="location.reload()">再玩一次</button>
</div>

<script src="https://sf3-ttcdn-tos.pstatp.com/obj/volcengine/byteplus-effects-sdk.js"></script>

<script>
let score = 0, timeLeft = 60, currentLevel = 1, currentMode = 'imitate';
let comboCount = 0, maxCombo = 0;
let actionDuration = 6000, beatIntervalTime = 600;
let last = null, beatWindow = 0, beatChecked = false;
let currentAction = "reach", currentActionIndex = 0;
let beatInterval, actionInterval, timerInterval;
let isDistractionActive = false;
let effectEngine = null; 
let useFallbackVideo = false;

const difficultyMatrix = {
  1: { reaction_time: 5.0, sequence_length: 1, distraction_rate: 0.0, speed: "slow", beat: 600 },
  2: { reaction_time: 4.0, sequence_length: 2, distraction_rate: 0.0, speed: "medium", beat: 450 },
  3: { reaction_time: 3.0, sequence_length: 4, distraction_rate: 0.1, speed: "normal", beat: 350 },
  4: { reaction_time: 1.5, sequence_length: 6, distraction_rate: 0.3, speed: "fast", beat: 260 }
};

let audioCtx = null, mainVolumeNode = null, currentNoteIndex = 0;
const easonMelodyNotes = [3, 2, 1, 1, 7, 1, 5, 0, 1, 1, 7, 1, 1, 2, 3, 2, 3, 2, 1, 1, 7, 1, 5, 5, 6, 1, 2, 3, 2, 1, 1, 0];
const noteToFreq = { 0: 0, 5: 196.00, 6: 220.00, 7: 246.94, 1: 261.63, 2: 293.66, 3: 329.63, 4: 349.23 };
const melodyFreqs = easonMelodyNotes.map(n => noteToFreq[n] || 0);

const actionsList = ["reach", "run", "knees", "star", "highlow", "rolls", "jacks", "clap", "sidebend", "freeze"];

const svgTemplates = {
  "reach": `<path d="M12 22V10M12 10L8 14M12 10L16 14M6 6H18" stroke="#00FF88"/>`, 
  "run": `<circle cx="12" cy="5" r="2"/><path d="M12 7v6l-3 4M12 9l4 3M9 11l-2-2"/>`, 
  "knees": `<path d="M12 4v8m0 0l4 5M12 12l-5-2M19 20H5"/>`, 
  "star": `<path d="M12 2L15 8L22 9L17 14L18 21L12 17L6 21L7 14L2 9L9 8Z" fill="#FFD600"/>`, 
  "highlow": `<path d="M12 3v12M12 3L8 7M12 3l4 4M7 21h10"/>`, 
  "rolls": `<path d="M21 12a9 9 0 1 1-9-9" stroke="#00d4ff"/><path d="M12 1v4l-2-2Z"/>`, 
  "jacks": `<path d="M5 12h14M12 5v14"/>`, 
  "clap": `<path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10Z"/><path d="M8 12h8"/>`, 
  "sidebend": `<path d="M12 3a9 9 0 0 0-9 9h3a6 6 0 0 1 6-6V3Z" fill="#00d4ff"/>`, 
  "freeze": `<path d="M12 2v20M2 12h20M5 5l14 14M19 5L5 19" stroke="#FF3366"/>`, 
  "alert": `<path d="M12 9v4M12 17h.01" stroke-width="4"/><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>` 
};

function selectMode(mode) {
  currentMode = mode;
  document.querySelectorAll('[id^="md-"]').forEach(btn => btn.classList.remove('active'));
  document.getElementById('md-' + mode).classList.add('active');
}

function selectLevel(lv) {
  currentLevel = lv;
  document.querySelectorAll('[id^="lv-"]').forEach(btn => btn.classList.remove('active'));
  document.getElementById('lv-' + lv).classList.add('active');
}

function selectTime(seconds) {
  timeLeft = seconds;
  document.querySelectorAll('[id^="time-"]').forEach(btn => btn.classList.remove('active'));
  document.getElementById('time-' + seconds).classList.add('active');
}

function playMusicTick() {
  if (!audioCtx || !mainVolumeNode) return;
  let now = audioCtx.currentTime;
  let kickOsc = audioCtx.createOscillator(), kickGain = audioCtx.createGain();
  kickOsc.connect(kickGain); kickGain.connect(mainVolumeNode);
  kickOsc.frequency.setValueAtTime(140, now);
  kickOsc.frequency.exponentialRampToValueAtTime(0.01, now + 0.18);
  kickGain.gain.setValueAtTime(0.45, now);
  kickGain.gain.linearRampToValueAtTime(0.001, now + 0.18);
  kickOsc.start(now); kickOsc.stop(now + 0.18);

  let currentFreq = melodyFreqs[currentNoteIndex];
  if (currentFreq > 0) {
    let melodyOsc = audioCtx.createOscillator(), melodyGain = audioCtx.createGain();
    melodyOsc.type = 'sine';
    melodyOsc.connect(melodyGain); melodyGain.connect(mainVolumeNode);
    melodyOsc.frequency.setValueAtTime(currentFreq, now);
    melodyGain.gain.setValueAtTime(0.2, now);
    melodyGain.gain.exponentialRampToValueAtTime(0.005, now + 0.38);
    melodyOsc.start(now); melodyOsc.stop(now + 0.4);
  }
  currentNoteIndex = (currentNoteIndex + 1) % melodyFreqs.length;
}

function beat(){
  playMusicTick();
  const ring = document.getElementById("musicPulseRing");
  if(ring) {
    ring.classList.remove("ring-pulse");
    void ring.offsetWidth; 
    ring.classList.add("ring-pulse");
  }
  
  if (!beatChecked && beatWindow > 0 && currentMode !== 'freeze') {
    comboCount = 0;
    updateComboUI();
  }
  beatWindow = Date.now();
  beatChecked = false;
  resetJointDots();
}

// ===== 🤖 核心重構：7.5頭身 真人美學比例流暢骨架解算引擎 =====
function changeActionTo(index) {
  currentActionIndex = index;
  currentAction = actionsList[index];
  beatChecked = false;
  isDistractionActive = false;
  resetJointDots();
  
  const container = document.getElementById("instruction-container");
  container.classList.remove("distract-border");

  // 獲取真人骨架節點路徑
  const gLA = document.getElementById("girlLeftArm"), gRA = document.getElementById("girlRightArm");
  const gLL = document.getElementById("girlLeftLeg"), gRL = document.getElementById("girlRightLeg");
  const bLA = document.getElementById("boyLeftArm"), bRA = document.getElementById("boyRightArm");
  const bLL = document.getElementById("boyLeftLeg"), bRL = document.getElementById("boyRightLeg");

  let cfg = difficultyMatrix[currentLevel];
  if (Math.random() < cfg.distraction_rate) isDistractionActive = true;

  let uiText = "";
  let iconKey = currentAction;

  if (currentMode === 'imitate') {
    uiText = getActionChinese(currentAction);
  } else if (currentMode === 'react') {
    uiText = "快! 做出：" + getActionChinese(currentAction);
  } else if (currentMode === 'freeze') {
    if (Math.random() < 0.45) {
      currentAction = "freeze";
      iconKey = "freeze";
      uiText = "❄ 突然 FREEZE！定格別動！ ❄";
    } else {
      uiText = "跟著動：👉 " + getActionChinese(currentAction);
    }
  }

  if (isDistractionActive && currentLevel === 4) {
    if (Math.random() > 0.5) {
      uiText = "❌ 不要動！！ (假提示)";
      iconKey = "alert";
      container.classList.add("distract-border");
    }
  }

  setUI(uiText, iconKey);

  // 真人幾何學運動解算器 (人型解算坐標對齊 120x160 仿真比例)
  if (currentAction === "reach" || currentAction === "freeze") {
    // 雙手垂直向上伸展過頭
    gLA.setAttribute("d", "M44,38 L38,20 L40,4");    gRA.setAttribute("d", "M76,38 L82,20 L80,4");
    bLA.setAttribute("d", "M40,36 L34,18 L36,4");    bRA.setAttribute("d", "M80,36 L86,18 L84,4");
    setLegsNormal(gLL, gRL, bLL, bRL);
    updateAllDots(40, 4, 80, 4, 42, 114, 78, 114);
  } 
  else if (currentAction === "run") {
    // 跑步：仿真前後擺臂與曲膝擺動
    gLA.setAttribute("d", "M44,38 L32,46 L24,38");   gRA.setAttribute("d", "M76,38 L86,52 L96,62");
    bLA.setAttribute("d", "M40,36 L28,44 L20,36");   bRA.setAttribute("d", "M80,36 L90,50 L100,60");
    gLL.setAttribute("d", "M50,82 L38,102 L32,130"); gRL.setAttribute("d", "M70,82 L82,118 L76,148");
    bLL.setAttribute("d", "M48,82 L36,102 L30,130"); bRL.setAttribute("d", "M72,82 L84,118 L78,148");
    updateAllDots(24, 38, 96, 62, 38, 102, 82, 118);
  } 
  else if (currentAction === "knees") {
    // 交替抬腿 (高抬膝關節)
    gLA.setAttribute("d", "M44,38 L28,44 L22,58");   gRA.setAttribute("d", "M76,38 L92,44 L98,58");
    bLA.setAttribute("d", "M40,36 L24,42 L18,56");   bRA.setAttribute("d", "M80,36 L96,42 L102,56");
    gLL.setAttribute("d", "M50,82 L30,86 L28,122");  gRL.setAttribute("d", "M70,82 L90,86 L92,122");
    bLL.setAttribute("d", "M48,82 L28,86 L26,122");  bRL.setAttribute("d", "M72,82 L88,86 L90,122");
    updateAllDots(22, 58, 98, 58, 30, 86, 90, 86);
  } 
  else if (currentAction === "star" || currentAction === "jacks") {
    // 側向開合跳：四肢大幅度伸展
    gLA.setAttribute("d", "M44,38 L22,28 L6,18");     gRA.setAttribute("d", "M76,38 L98,28 L114,18");
    bLA.setAttribute("d", "M40,36 L18,26 L4,16");     bRA.setAttribute("d", "M80,36 L102,26 L116,16");
    gLL.setAttribute("d", "M50,82 L28,114 L14,148");  gRL.setAttribute("d", "M70,82 L92,114 L106,148");
    bLL.setAttribute("d", "M48,82 L26,114 L12,148");  bRL.setAttribute("d", "M72,82 L94,114 L108,148");
    updateAllDots(6, 18, 114, 18, 28, 114, 92, 114);
  } 
  else if (currentAction === "highlow") {
    // 摸天深蹲
    gLA.setAttribute("d", "M44,38 L38,20 L40,4");    gRA.setAttribute("d", "M76,38 L82,20 L80,4");
    bLA.setAttribute("d", "M40,36 L34,18 L36,4");    bRA.setAttribute("d", "M80,36 L86,18 L84,4");
    gLL.setAttribute("d", "M50,82 L34,102 L52,142"); gRL.setAttribute("d", "M70,82 L86,102 L68,142");
    bLL.setAttribute("d", "M48,82 L32,102 L50,142"); bRL.setAttribute("d", "M72,82 L88,102 L70,142");
    updateAllDots(40, 4, 80, 4, 34, 102, 86, 102);
  } 
  else if (currentAction === "rolls") {
    // 健美式雙手叉腰
    gLA.setAttribute("d", "M44,38 L28,52 L42,66");   gRA.setAttribute("d", "M76,38 L92,52 L78,66");
    bLA.setAttribute("d", "M40,36 L24,50 L38,64");   bRA.setAttribute("d", "M80,36 L96,50 L82,64");
    setLegsNormal(gLL, gRL, bLL, bRL);
    updateAllDots(42, 66, 78, 66, 42, 114, 78, 114);
  } 
  else if (currentAction === "clap") {
    // 胸前專業靠攏擊掌
    gLA.setAttribute("d", "M44,38 L54,52 L58,40");   gRA.setAttribute("d", "M76,38 L66,52 L62,40");
    bLA.setAttribute("d", "M40,36 L52,50 L56,38");   bRA.setAttribute("d", "M80,36 L68,50 L64,38");
    setLegsNormal(gLL, gRL, bLL, bRL);
    updateAllDots(58, 40, 62, 40, 42, 114, 78, 114);
  } 
  else if (currentAction === "sidebend") {
    // 側彎：左手叉腰，右手空中向左大幅度弧形拉伸
    gLA.setAttribute("d", "M44,38 L28,52 L42,66");   gRA.setAttribute("d", "M76,38 L66,16 L44,6");
    bLA.setAttribute("d", "M40,36 L24,50 L38,64");   bRA.setAttribute("d", "M80,36 L70,14 L48,4");
    gLL.setAttribute("d", "M50,82 L38,114 L42,148"); gRL.setAttribute("d", "M70,82 L82,114 L86,148");
    bLL.setAttribute("d", "M48,82 L36,114 L40,148"); bRL.setAttribute("d", "M72,82 L80,114 L84,148");
    updateAllDots(42, 66, 44, 6, 38, 114, 82, 114);
  }
}

function setLegsNormal(gLL, gRL, bLL, bRL) {
  gLL.setAttribute("d", "M50,82 L42,114 L46,148"); gRL.setAttribute("d", "M70,82 L78,114 L74,148");
  bLL.setAttribute("d", "M48,82 L42,114 L46,148"); bRL.setAttribute("d", "M72,82 L78,114 L74,148");
}

function updateAllDots(lhX, lhY, rhX, rhY, lkX, lkY, rkX, rkY) {
  updateDotPos("g_lh", lhX, lhY); updateDotPos("g_rh", rhX, rhY);
  updateDotPos("g_lk", lkX, lkY); updateDotPos("g_rk", rkX, rkY);
  updateDotPos("b_lh", lhX, lhY); updateDotPos("b_rh", rhX, rhY);
  updateDotPos("b_lk", lkX, lkY); updateDotPos("b_rk", rkX, rkY);
}

function getActionChinese(act) {
  return {
    "reach": "雙手高舉過頭 🙌", "run": "原地輕鬆踏步 🏃", "knees": "交替抬高雙腿 ⚡", "star": "雙手雙腳大張 ⭐",
    "highlow": "摸天再向下蹲 ↕", "rolls": "緩慢轉動雙肩 🔄", "jacks": "雙手平舉開合 🕺", "clap": "胸前靠攏擊掌 👏",
    "sidebend": "身體往左側彎 🧘", "freeze": "全身保持定格 ❄"
  }[act] || "準備運動";
}

function setUI(text, iconKey) {
  const prefix = { 1: '慢速引導：', 2: '標準節奏：', 3: '進階挑戰：', 4: '快速極限：' }[currentLevel];
  document.getElementById("instruction-text").innerHTML = `<span class="speed-tip">${prefix}</span>${text}`;
  const svgEl = document.getElementById("visual-svg");
  svgEl.innerHTML = svgTemplates[iconKey] || "";
}

function updateDotPos(id, x, y) {
  const el = document.getElementById(id); if(el) { el.setAttribute("cx", x); el.setAttribute("cy", y); }
}

function resetJointDots() { document.querySelectorAll('.joint-dot').forEach(dot => dot.classList.remove('joint-success')); }

function lightUpJoints() {
  let targets = ["g_lh", "g_rh", "b_lh", "b_rh"];
  if(["run", "knees"].includes(currentAction)) targets = ["g_lk", "g_rk", "b_lk", "b_rk"];
  targets.forEach(id => { const el = document.getElementById(id); if(el) el.classList.add('joint-success'); });
}

function newAction(){ changeActionTo((currentActionIndex + 1) % actionsList.length); }
function updateComboUI() {
  const el = document.getElementById("comboPanel");
  if (comboCount >= 3) { el.style.display = "block"; el.innerText = `連擊: ${comboCount} 🔥`; if (comboCount > maxCombo) maxCombo = comboCount; }
  else { el.style.display = "none"; }
}

function checkPose(kp) {
  const easeFactor = (currentLevel <= 2) ? 1.25 : 1.0;

  if (currentLevel === 4 && isDistractionActive && document.getElementById("instruction-container").classList.contains("distract-border")) {
    if(!last) return true;
    let motion = 0;
    kp.forEach((p, i) => motion += Math.abs(p.x - last[i].x) + Math.abs(p.y - last[i].y));
    return motion < (0.12 * easeFactor);
  }

  switch(currentAction) {
    case "reach": 
      return kp[4].y < kp[0].y * easeFactor && kp[7].y < kp[0].y * easeFactor;
    case "run": 
      return Math.abs(kp[13].y - kp[14].y) > (0.035 / easeFactor);
    case "knees": 
      return kp[13].y < kp[11].y * easeFactor || kp[14].y < kp[12].y * easeFactor;
    case "star": 
      return (kp[4].y < kp[11].y * easeFactor) && (Math.abs(kp[15].x - kp[16].x) > (0.24 / easeFactor));
    case "highlow": 
      return (kp[4].y < kp[11].y) || (kp[0].y > (0.55 / easeFactor));
    case "rolls": 
      if(!last) return false; 
      return Math.abs(kp[11].y - last[11].y) > (0.012 / easeFactor);
    case "jacks": 
      return Math.abs(kp[15].x - kp[16].x) > (0.22 / easeFactor);
    case "clap": 
      return Math.abs(kp[4].x - kp[7].x) < (0.15 * easeFactor);
    case "sidebend": 
      return kp[4].y < kp[11].y * easeFactor && kp[7].x < kp[12].x * easeFactor;
    case "freeze": 
      if(!last) return true; 
      let m = 0;
      kp.forEach((p, i) => m += Math.abs(p.x - last[i].x) + Math.abs(p.y - last[i].y)); 
      return m < (0.15 * easeFactor);
    default: 
      return false;
  }
}

function judgeTiming(){
  const diff = Date.now() - beatWindow;
  let basePerf = difficultyMatrix[currentLevel].beat;
  if (diff <= basePerf) return "完美";
  if (diff <= basePerf * 1.8) return "良好";
  return "再接再厲";
}

function showRating(text){
  const rat = document.getElementById("rating"); rat.innerText = text; rat.style.opacity = 1;
  if(text === "完美") { rat.style.color = "#00FF88"; rat.style.textShadow = "0 0 25px #00FF88"; }
  if(text === "良好") { rat.style.color = "#FFD600"; rat.style.textShadow = "0 0 25px #FFD600"; }
  setTimeout(() => { if(rat.innerText === text) rat.style.opacity = 0; }, 400);
}

function scorePopUp(points){
  const el = document.getElementById("scorePop"); el.innerText = "+" + points; el.style.opacity = 1; el.style.transform = "translate(-50%, -150%)";
  setTimeout(() => { el.style.opacity = 0; el.style.transform = "translate(-50%,-50%)"; }, 400);
}

function particles(){
  const gameScreen = document.getElementById("gameScreen");
  for(let i=0; i<10; i++){
    const p = document.createElement("div"); p.className = "particle";
    p.style.left = (window.innerWidth / 2) + "px"; p.style.top = (window.innerHeight / 2) + "px";
    const angle = Math.random() * Math.PI * 2, distance = 40 + Math.random() * 80;
    p.style.setProperty('--mx', `${Math.cos(angle) * distance}px`);
    p.style.setProperty('--my', `${Math.sin(angle) * distance}px`);
    gameScreen.appendChild(p); setTimeout(()=>p.remove(), 600);
  }
}

async function startGame(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  mainVolumeNode = audioCtx.createGain(); mainVolumeNode.gain.setValueAtTime(0.5, audioCtx.currentTime); mainVolumeNode.connect(audioCtx.destination);

  let cfg = difficultyMatrix[currentLevel]; beatIntervalTime = cfg.beat;
  actionDuration = (currentLevel === 1) ? 6000 : ((currentLevel === 2) ? 4500 : ((currentLevel === 3) ? 3000 : 1800));
  const modeCht = { 'imitate': '模仿模式', 'react': '反應速度', 'freeze': '定格控制' }[currentMode];
  document.getElementById("modePanel").innerText = `模式：${modeCht} (Lv.${currentLevel})`;
  document.getElementById("timerPanel").innerText = "剩餘時間: " + timeLeft;
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";

  const canvasEl = document.getElementById("canvas"); 
  const ctx = canvasEl.getContext('2d');
  canvasEl.width = window.innerWidth; 
  canvasEl.height = window.innerHeight;
  const videoEl = document.getElementById("video");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }, 
      audio: false 
    });
    videoEl.srcObject = stream;
    await videoEl.play();
  } catch (err) {
    alert("無法啟動鏡頭，請檢查權限設定或安全連線(HTTPS)：" + err.message);
    return;
  }

  try {
    effectEngine = new BytePlusEffectsSDK.EffectEngine({
      canvas: canvasEl,
      licenseData: "YOUR_BYTEPLUS_LICENSE_BASE64_STRING" 
    });
    await effectEngine.init();
    await effectEngine.enableAlgorithm(BytePlusEffectsSDK.AlgorithmType.SKELETON);
    useFallbackVideo = false;
  } catch (sdkErr) {
    console.warn("BytePlus SDK 初始化失敗（或憑證未填寫），已切換至普通鏡頭預覽模式：", sdkErr);
    useFallbackVideo = true;
  }

  function processBytePlusFrameLoop() {
    if (!videoEl.paused && !videoEl.ended) {
      if(currentAction === "freeze") canvasEl.classList.add("freeze-effect");
      else canvasEl.classList.remove("freeze-effect");

      if (useFallbackVideo) {
        ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
        ctx.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
        requestAnimationFrame(processBytePlusFrameLoop);
      } else {
        effectEngine.processVideoFrame(videoEl).then((results) => {
          if (results && results.skeletonData && results.skeletonData.keypoints) {
            const kp = results.skeletonData.keypoints;
            let isCorrect = checkPose(kp);

            if(isCorrect && !beatChecked){
              const result = judgeTiming();
              if(result !== "再接再厲") {
                comboCount++; updateComboUI();
                let comboBonus = (comboCount >= 10) ? 1.2 : ((comboCount >= 5) ? 1.1 : 1.0);
                let earnedPoints = Math.round(((result === "完美") ? 20 : 10) * comboBonus);
       
                score += earnedPoints;
                document.getElementById("scorePanel").innerText = "目前得分: " + score;
                beatChecked = true; lightUpJoints(); showRating(result); scorePopUp(earnedPoints); particles();
                
                if(audioCtx) {
                  let hitOsc = audioCtx.createOscillator(), hitGain = audioCtx.createGain();
                  hitOsc.type = 'sine';
                  hitOsc.frequency.setValueAtTime(result === "完美" ? 600 : 480, audioCtx.currentTime);
                  hitOsc.connect(hitGain); hitGain.connect(audioCtx.destination);
                  hitGain.gain.setValueAtTime(0.12, audioCtx.currentTime); hitGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                  hitOsc.start();
                  hitOsc.stop(audioCtx.currentTime + 0.12);
                }
              }
            }
            last = kp;
          }
          requestAnimationFrame(processBytePlusFrameLoop);
        }).catch(err => {
          ctx.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
          requestAnimationFrame(processBytePlusFrameLoop);
        });
      }
    } else {
      requestAnimationFrame(processBytePlusFrameLoop);
    }
  }

  processBytePlusFrameLoop();
  
  timerInterval = setInterval(() => {
    timeLeft--; document.getElementById("timerPanel").innerText = "剩餘時間: " + timeLeft;
    if(timeLeft <= 0){ clearInterval(timerInterval); clearInterval(beatInterval); clearInterval(actionInterval); endGame(); }
  }, 1000);

  changeActionTo(0); 
  beatInterval = setInterval(beat, beatIntervalTime); 
  actionInterval = setInterval(newAction, actionDuration); 
}

function endGame(){
  document.getElementById("gameScreen").style.display = "none"; document.getElementById("endScreen").style.display = "flex";
  document.getElementById("finalScore").innerText = `🎉 體能挑戰完成！\n最終得分：${score} 分`;
  let reviewText = (score >= 150) ? "👍 良好表現！能有效跟隨廣東歌旋律節奏進行身體運動。" : "🌱 持續進步！建議每日從 Lv.1 慢速引導模式規律練習。";
  document.getElementById("performanceReview").innerText = `${reviewText}\n(最高連續完美擊中：${maxCombo} 次)`;
  
  const videoEl = document.getElementById("video");
  if(videoEl && videoEl.srcObject) videoEl.srcObject.getTracks().forEach(track => track.stop());
  if(audioCtx) audioCtx.close();
}

window.addEventListener('resize', () => {
  const canvasEl = document.getElementById("canvas"); if(canvasEl) { canvasEl.width = window.innerWidth; canvasEl.height = window.innerHeight; }
});
</script>
