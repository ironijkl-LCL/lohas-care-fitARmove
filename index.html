<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>FitAR 動活+ | Beat Mode 🎵</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index: 10;
}

/* ===== 開始畫面 ===== */
#startScreen {
  background:linear-gradient(#0f2027,#203a43,#2c5364);
}

#startScreen h2 {
  font-size: 28px;
  color: #00C2FF;
  margin-top: -10px;
  margin-bottom: 30px;
}

.start-btn {
  padding:20px 50px;
  border:3px solid #fff;
  border-radius:50px;
  font-size:26px;
  margin:10px;
  cursor:pointer;
  background:#00d4ff;
  color:black;
  font-weight: bold;
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
  transition: all 0.2s;
}
.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
}

/* ===== 遊戲畫面 ===== */
#gameScreen {
  position: relative;
  width: 100vw;
  height: 100vh;
}

canvas {
  position:absolute;
  width:100vw;
  height:100vh;
  object-fit: cover;
}

/* 👉 頂部 UI 面板大字體 */
#topUI {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  z-index: 5;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.panel {
  display:inline-block;
  padding:15px 30px;
  border-radius:30px;
  background:rgba(0,0,0,0.7);
  font-size: 26px;
  font-weight: bold;
  border: 1px solid rgba(255,255,255,0.3);
}

/* 👉 動作提示大字 + 霓虹呼吸燈 */
#instruction {
  font-size: 60px;
  color: #00d4ff;
  font-weight: 900;
  text-shadow: 0 0 15px #00d4ff, 0 0 5px #fff;
  letter-spacing: 2px;
  margin-top: 110px;
  animation: neonPulse 1.5s infinite alternate;
}

@keyframes neonPulse {
  from { opacity: 0.8; transform: scale(1); }
  to { opacity: 1; transform: scale(1.03); }
}

/* 👉 節奏判定大圈圈 */
#beatCircle {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:160px;
  height:160px;
  border: 6px solid #00C2FF;
  border-radius:50%;
  opacity:0.3;
  z-index: 4;
  box-shadow: 0 0 20px #00C2FF;
  transition: opacity 0.1s;
}

/* Beat 縮放動畫：節奏感更強 */
.pulse {
  animation: pulseAnim 0.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  opacity: 0.9 !important;
}
@keyframes pulseAnim {
  from { transform: translate(-50%,-50%) scale(1.4); border-color: #fff; }
  to { transform: translate(-50%,-50%) scale(1); border-color: #00C2FF; }
}

/* 👉 評級大字（PERFECT / GOOD / MISS）特大置中 */
#rating {
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  font-size: 100px;
  font-weight: 900;
  letter-spacing: 4px;
  opacity:0;
  z-index: 5;
  pointer-events: none;
}

/* 👉 分數浮字 */
#scorePop {
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
  color:#FFD600;
  font-weight: 900;
  text-shadow: 0 0 15px #FFD600;
  opacity:0;
  z-index: 6;
  transition: transform 0.4s ease-out, opacity 0.4s ease-out;
  pointer-events: none;
}

/* 噴發粒子 */
.particle {
  position:absolute;
  width:10px;
  height:10px;
  background:#00FF88;
  border-radius:50%;
  z-index: 4;
  pointer-events: none;
  animation: particleMove 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes particleMove { to { transform: translate(var(--mx), var(--my)); opacity:0; } }

/* ===== 結算 ===== */
#endScreen {
  display:none;
  background:#111;
}
#finalScore {
  font-size: 50px;
  margin-bottom: 30px;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>FitAR 動活+</h1>
  <h2>Beat Mode 🎵</h2>
  <button class="start-btn" onclick="startGame()">開始節奏模式</button>
</div>

<div id="gameScreen" style="display:none;">
  <div id="topUI">
    <div id="score" class="panel">Score: 0</div>
    <div id="timer" class="panel">時間: 30</div>
  </div>

  <div id="instruction-container" style="position: absolute; top: 20px; width: 100%; text-align: center; z-index: 5;">
    <div id="instruction">準備...</div>
  </div>

  <div id="beatCircle"></div>
  <div id="rating"></div>
  <div id="scorePop">+20</div>

  <video id="video" style="display:none;" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="endScreen" class="screen">
  <h1 id="finalScore"></h1>
  <button class="start-btn" onclick="location.reload()">再玩一次</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let score = 0, timeLeft = 30;
let last = null;
let beatWindow = 0;
let currentAction = "raise";
let beatChecked = false; // 💡 關鍵鎖：防止每拍重複觸發多次計分

const instruction = document.getElementById("instruction");
const scoreText = document.getElementById("score");
const rating = document.getElementById("rating");

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ====== BEAT SYSTEM (節奏核心) ======
function beat(){
  const circle = document.getElementById("beatCircle");
  
  // 💡 如果上一拍玩家完全沒動或沒對，在下一拍開始時強制結算 MISS
  if (!beatChecked && beatWindow > 0) {
    showRating("MISS");
  }

  // 重置拍點狀態
  circle.classList.remove("pulse");
  void circle.offsetWidth; // 強制重繪，確保動畫能重複觸發
  circle.classList.add("pulse");

  beatWindow = Date.now();
  beatChecked = false; // 每拍解鎖，允許這拍進行新的判定
}

// ===== 動作更新 (每 3 秒換一個動作) =====
function newAction(){
  const arr = ["raise", "jump", "run"];
  currentAction = arr[Math.floor(Math.random() * arr.length)];

  if(currentAction === "raise") instruction.innerText = "🙌 舉起雙手！";
  if(currentAction === "jump")  instruction.innerText = "🕺 跳開合跳！";
  if(currentAction === "run")   instruction.innerText = "🏃 抬腿跑步！";
}

// ===== 骨架算法判定 =====
function isHandsUp(lm){ return lm[15].y < lm[0].y && lm[16].y < lm[0].y; }
function isJump(lm){ return Math.abs(lm[27].x - lm[28].x) > 0.25; }
function isRun(lm){ return Math.abs(lm[25].y - lm[26].y) > 0.06; }

// ===== 評分精準 Timing 機制 =====
function judgeTiming(){
  const diff = Date.now() - beatWindow;

  if (diff <= 250) return "PERFECT"; // 拍點後半拍內 (250毫秒) 算 Perfect
  if (diff <= 600) return "GOOD";    // 600毫秒內算 Good
  return "MISS";
}

function showRating(text){
  rating.innerText = text;
  rating.style.opacity = 1;

  if(text === "PERFECT") { rating.style.color = "#00FF88"; rating.style.textShadow = "0 0 20px #00FF88"; }
  if(text === "GOOD")    { rating.style.color = "#FFD600"; rating.style.textShadow = "0 0 20px #FFD600"; }
  if(text === "MISS")    { rating.style.color = "#FF3366"; rating.style.textShadow = "0 0 20px #FF3366"; }

  setTimeout(() => { if(rating.innerText === text) rating.style.opacity = 0; }, 250);
}

function scorePopUp(points){
  const el = document.getElementById("scorePop");
  el.innerText = "+" + points;
  el.style.opacity = 1;
  el.style.transform = "translate(-50%, -150%)"; // 向上飄移
  setTimeout(() => { el.style.opacity = 0; el.style.transform = "translate(-50%,-50%)"; }, 300);
}

function particles(){
  const gameScreen = document.getElementById("gameScreen");
  for(let i=0; i<15; i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = (window.innerWidth / 2) + "px";
    p.style.top = (window.innerHeight / 2) + "px";
    const angle = Math.random() * Math.PI * 2;
    const distance = 40 + Math.random() * 120;
    p.style.setProperty('--mx', `${Math.cos(angle) * distance}px`);
    p.style.setProperty('--my', `${Math.sin(angle) * distance}px`);
    gameScreen.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}

// ===== MediaPipe Pose =====
const pose = new Pose({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});

// 優化參數，減少卡頓
pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

pose.onResults(r => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(r.image, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  if(r.poseLandmarks){
    const lm = r.poseLandmarks;
    let actionOK = false;

    if(currentAction === "raise") actionOK = isHandsUp(lm);
    if(currentAction === "jump")  actionOK = isJump(lm);
    if(currentAction === "run")   actionOK = isRun(lm);

    // 💡 只有動作正確、且這一拍還沒拿過分 (!beatChecked) 時才進行節奏判定
    if(actionOK && !beatChecked){
      const result = judgeTiming();

      if(result !== "MISS") {
        let earnedPoints = (result === "PERFECT") ? 20 : 10;
        score += earnedPoints;
        scoreText.innerText = "Score: " + score;
        beatChecked = true; // 💡 立刻鎖定這一拍，直到下一拍重新解鎖
        
        showRating(result);
        scorePopUp(earnedPoints);
        particles();
      }
    }
    last = lm;
  }
});

// ===== Camera & Loop =====
function startGame(){
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";

  const cam = new Camera(video,{
    onFrame: async () => await pose.send({image:video}),
    width: 640, height: 480
  });
  cam.start();

  // 啟動倒數計時
  const timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "時間: " + timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      clearInterval(beatInterval);
      clearInterval(actionInterval);
      endGame();
    }
  }, 1000);

  // 啟動節奏與動作輪替
  newAction();
  const beatInterval = setInterval(beat, 1000); // 1秒1拍 (60 BPM)
  const actionInterval = setInterval(newAction, 3000); // 3秒換動作
}

function endGame(){
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "flex";
  document.getElementById("finalScore").innerText = "挑戰結束！最終分數：" + score;
  if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
}
</script>

</body>
</html>
