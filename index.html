<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>FitAR 動活+ | FitAR Move+</title>

<style>
body {
  margin:0;
  font-family: 'Microsoft JhengHei', sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* ===== 共用畫面 ===== */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index: 10;
}

#startScreen {
  background:linear-gradient(#0f2027,#203a43,#2c5364);
}

#startScreen h1 {
  font-size: 55px;
  margin-bottom: 5px;
  text-shadow: 0 0 10px #00C2FF;
}

#startScreen h2 {
  font-size: 32px;
  color: #00C2FF;
  margin-top: 0;
  margin-bottom: 40px;
  font-weight: 300;
}

/* 特大號進入按鈕 */
.start-btn {
  padding: 25px 60px;
  border: 4px solid #fff;
  border-radius: 60px;
  font-size: 32px;
  cursor: pointer;
  background: #00d4ff;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
  transition: all 0.2s;
}
.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0, 212, 255, 0.9);
}

/* ===== 遊戲畫面 ===== */
#gameScreen {
  display:none;
  position: relative;
  width: 100vw;
  height: 100vh;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* 👉 右上方特大 UI 面板 */
#topUI {
  position:absolute;
  top:20px;
  right:30px;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.panel {
  padding: 15px 35px;
  border-radius: 25px;
  background: rgba(0,0,0,0.75);
  font-size: 32px;
  font-weight: bold;
  border: 2px solid rgba(255,255,255,0.3);
  text-align: right;
  min-width: 200px;
}

#timerPanel {
  color: #FF3366;
  border-color: #FF3366;
}

/* 👉 頂部大 WARM UP 標題 */
#stageTitle {
  position: absolute;
  top: 25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 45px;
  font-weight: 900;
  color: #FFF;
  text-shadow: 0 0 15px #00C2FF;
  z-index: 5;
  letter-spacing: 3px;
}

/* 👉 動作提示字：特大、清晰、強調慢慢做 */
#instruction-box {
  position: absolute;
  top: 110px;
  width: 100%;
  text-align: center;
  z-index: 5;
}

#instruction {
  display: inline-block;
  padding: 15px 40px;
  background: rgba(0, 0, 0, 0.8);
  border-radius: 40px;
  border: 3px solid #00d4ff;
  font-size: 48px;
  color: #fff;
  font-weight: 900;
  text-shadow: 0 0 15px #00d4ff;
  letter-spacing: 2px;
}

.slow-text {
  color: #FFD600;
  text-shadow: 0 0 10px #FFD600;
}

/* 👉 保證 100% 顯示的特大、靚麗卡通公仔組（女孩+男孩） */
#coachContainer {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: 60px;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
}

.avatar-coach {
  width: 320px;  /* 特大尺寸，容易看 */
  height: 380px;
  transition: transform 0.3s ease-in-out;
}

/* 給公仔加上正在運動的微動態，更生動靚麗 */
.dancing {
  animation: coachBounce 0.8s infinite alternate ease-in-out;
}
@keyframes coachBounce {
  from { transform: translateY(0) scale(1); }
  to { transform: translateY(-15px) scale(1.02); }
}

/* 👉 全中文中文評級（完美 / 良好） */
#rating {
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  font-size: 120px;
  font-weight: 900;
  letter-spacing: 6px;
  opacity:0;
  z-index: 10;
  pointer-events: none;
}

/* 分數浮字 */
#scorePop {
  position:absolute;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size: 70px;
  color:#FFD600;
  font-weight: 900;
  text-shadow: 0 0 15px #FFD600;
  opacity:0;
  z-index: 8;
  transition: transform 0.4s ease-out, opacity 0.4s ease-out;
  pointer-events: none;
}

/* 噴發粒子 */
.particle {
  position:absolute;
  width:12px;
  height:12px;
  background:#00FF88;
  border-radius:50%;
  z-index: 6;
  pointer-events: none;
  animation: particleMove 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes particleMove { to { transform: translate(var(--mx), var(--my)); opacity:0; } }

/* 結算畫面 */
#endScreen {
  display:none;
  background:#111;
}
#finalScore {
  font-size: 60px;
  margin-bottom: 40px;
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>FitAR 動活+</h1>
  <h2>健康熱身模式 🎵</h2>
  <button class="start-btn" onclick="startGame()">開始慢慢做運動</button>
</div>

<div id="gameScreen">
  <div id="stageTitle">熱身運動 WARM UP</div>

  <div id="topUI">
    <div id="score" class="panel">得分: 0</div>
    <div id="timerPanel" class="panel">倒計時: 40</div>
  </div>

  <div id="instruction-box">
    <div id="instruction"><span class="slow-text">慢慢做：</span>準備中...</div>
  </div>

  <div id="coachContainer">
    <svg class="avatar-coach dancing" id="girlCoach" viewBox="0 0 100 120">
      <defs>
        <linearGradient id="skinG" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFD1A9"/>
          <stop offset="100%" stop-color="#F3A972"/>
        </linearGradient>
        <linearGradient id="clothG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#00E5FF"/>
          <stop offset="100%" stop-color="#00A1B5"/>
        </linearGradient>
      </defs>
      <path d="M25,25 C10,20 5,45 20,50 C15,35 20,28 25,25 Z" fill="#4A2711" />
      <path id="girlLeftArm" d="M32,55 C20,35 22,20 28,10 C32,20 30,40 35,55 Z" fill="url(#skinG)" />
      <path id="girlRightArm" d="M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z" fill="url(#skinG)" />
      <path d="M35,55 L65,55 L60,85 L40,85 Z" fill="url(#clothG)" />
      <circle cx="50" cy="40" r="18" fill="url(#skinG)" />
      <path d="M32,35 C32,20 68,20 68,35 C68,22 32,22 32,35 Z" fill="#5c3317" />
      <circle cx="44" cy="38" r="2.5" fill="#000" />
      <circle cx="56" cy="38" r="2.5" fill="#000" />
      <path d="M46,48 Q50,52 54,48" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" />
      <path d="M40,85 L60,85 L62,98 L51,98 L50,88 L49,98 L38,98 Z" fill="#007A8A" />
      <rect x="41" y="98" width="6" height="12" rx="3" fill="url(#skinG)" />
      <rect x="53" y="98" width="6" height="12" rx="3" fill="url(#skinG)" />
      <path d="M39,110 H48 V115 H39 Z" fill="#00E5FF" rx="2" />
      <path d="M52,110 H61 V115 H52 Z" fill="#00E5FF" rx="2" />
    </svg>

    <svg class="avatar-coach dancing" id="boyCoach" viewBox="0 0 100 120">
      <defs>
        <linearGradient id="boyClothG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FF6D00"/>
          <stop offset="100%" stop-color="#E65100"/>
        </linearGradient>
      </defs>
      <path id="boyLeftArm" d="M32,55 C20,35 22,20 28,10 C32,20 30,40 35,55 Z" fill="url(#skinG)" />
      <path id="boyRightArm" d="M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z" fill="url(#skinG)" />
      <path d="M35,55 L65,55 L60,85 L40,85 Z" fill="url(#boyClothG)" />
      <circle cx="50" cy="40" r="18" fill="url(#skinG)" />
      <path d="M31,32 C30,15 45,10 50,18 C55,10 70,15 69,32 C72,25 28,25 31,32 Z" fill="#795548" />
      <circle cx="44" cy="39" r="2.5" fill="#000" />
      <circle cx="56" cy="39" r="2.5" fill="#0 black" />
      <path d="M45,49 Q50,53 55,49" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" />
      <path d="M40,85 L60,85 L62,98 L51,98 L50,88 L49,98 L38,98 Z" fill="#29B6F6" />
      <rect x="41" y="98" width="6" height="12" rx="3" fill="url(#skinG)" />
      <rect x="53" y="98" width="6" height="12" rx="3" fill="url(#skinG)" />
      <path d="M39,110 H48 V115 H39 Z" fill="#FF6D00" rx="2" />
      <path d="M52,110 H61 V115 H52 Z" fill="#FF6D00" rx="2" />
    </svg>
  </div>

  <div id="rating"></div>
  <div id="scorePop">+20</div>

  <video id="video" style="display:none;" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="endScreen" class="screen">
  <h1 id="finalScore"></h1>
  <button class="start-btn" onclick="location.reload()">再玩一次</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let score = 0, timeLeft = 40;
let last = null;
let beatWindow = 0;
let currentAction = "raise";
let beatChecked = false;
let beatInterval, actionInterval, timerInterval;

const instruction = document.getElementById("instruction");
const scoreText = document.getElementById("score");
const rating = document.getElementById("rating");

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ====== 慢速節奏系統 ======
function beat(){
  if (!beatChecked && beatWindow > 0) {
    showRating("再接再厲"); // 把 MISS 改成溫和的中文鼓勵提示
  }
  beatWindow = Date.now();
  beatChecked = false;
}

// ===== 動作更新（👉 延長至 6 秒一個動作，清晰好跟隨） =====
function newAction(){
  const arr = ["raise", "jump", "run"];
  currentAction = arr[Math.floor(Math.random() * arr.length)];
  
  // 動態調整內嵌 SVG 公仔的手臂姿勢，讓畫面完美契合動作！
  const gLeft = document.getElementById("girlLeftArm");
  const gRight = document.getElementById("girlRightArm");
  const bLeft = document.getElementById("boyLeftArm");
  const bRight = document.getElementById("boyRightArm");

  if(currentAction === "raise") { 
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>雙手高舉 🙌`;
    // SVG 手臂向上拉直
    gLeft.setAttribute("d", "M32,55 C20,35 22,20 28,10 C32,20 30,40 35,55 Z");
    gRight.setAttribute("d", "M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z");
    bLeft.setAttribute("d", "M32,55 C20,35 22,20 28,10 C32,20 30,40 35,55 Z");
    bRight.setAttribute("d", "M68,55 C80,35 78,20 72,10 C68,20 70,40 65,55 Z");
  }
  if(currentAction === "jump") { 
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>雙腳張開 🕺`;
    // SVG 手臂向兩側平舉
    gLeft.setAttribute("d", "M35,55 C15,50 10,45 5,45 C10,55 20,58 35,55 Z");
    gRight.setAttribute("d", "M65,55 C85,50 90,45 95,45 C90,55 80,58 65,55 Z");
    bLeft.setAttribute("d", "M35,55 C15,50 10,45 5,45 C10,55 20,58 35,55 Z");
    bRight.setAttribute("d", "M65,55 C85,50 90,45 95,45 C90,55 80,58 65,55 Z");
  }
  if(currentAction === "run") { 
    instruction.innerHTML = `<span class="slow-text">慢慢做：</span>原地抬腿 🏃`;
    // SVG 手臂自然下垂呈跑步狀
    gLeft.setAttribute("d", "M35,55 C25,65 22,75 25,85 C30,75 32,65 35,55 Z");
    gRight.setAttribute("d", "M65,55 C75,65 78,75 75,85 C70,75 68,65 65,55 Z");
    bLeft.setAttribute("d", "M35,55 C25,65 22,75 25,85 C30,75 32,65 35,55 Z");
    bRight.setAttribute("d", "M65,55 C75,65 78,75 75,85 C70,75 68,65 65,55 Z");
  }
}

// ===== 骨架算法判定 =====
function isHandsUp(lm){ return lm[15].y < lm[0].y && lm[16].y < lm[0].y; }
function isJump(lm){ return Math.abs(lm[27].x - lm[28].x) > 0.25; }
function isRun(lm){ return Math.abs(lm[25].y - lm[26].y) > 0.05; }

// ===== 評分精準 Timing 機制 =====
function judgeTiming(){
  const diff = Date.now() - beatWindow;
  if (diff <= 500) return "完美";  // 寬大判定區間，更容易成功
  if (diff <= 1200) return "良好";
  return "再接再厲";
}

// 👉 顯示全中文特大反饋
function showRating(text){
  rating.innerText = text;
  rating.style.opacity = 1;

  if(text === "完美") { rating.style.color = "#00FF88"; rating.style.textShadow = "0 0 25px #00FF88"; }
  if(text === "良好") { rating.style.color = "#FFD600"; rating.style.textShadow = "0 0 25px #FFD600"; }
  if(text === "再接再厲") { rating.style.color = "#FF3366"; rating.style.textShadow = "0 0 25px #FF3366"; }

  setTimeout(() => { if(rating.innerText === text) rating.style.opacity = 0; }, 400);
}

function scorePopUp(points){
  const el = document.getElementById("scorePop");
  el.innerText = "+" + points;
  el.style.opacity = 1;
  el.style.transform = "translate(-50%, -150%)"; 
  setTimeout(() => { el.style.opacity = 0; el.style.transform = "translate(-50%,-50%)"; }, 400);
}

function particles(){
  const gameScreen = document.getElementById("gameScreen");
  for(let i=0; i<15; i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = (window.innerWidth / 2) + "px";
    p.style.top = (window.innerHeight / 2) + "px";
    const angle = Math.random() * Math.PI * 2;
    const distance = 40 + Math.random() * 120;
    p.style.setProperty('--mx', `${Math.cos(angle) * distance}px`);
    p.style.setProperty('--my', `${Math.sin(angle) * distance}px`);
    gameScreen.appendChild(p);
    setTimeout(()=>p.remove(), 600);
  }
}

// ===== MediaPipe Pose =====
const pose = new Pose({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

pose.onResults(r => {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(r.image, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  if(r.poseLandmarks){
    const lm = r.poseLandmarks;
    let actionOK = false;

    if(currentAction === "raise") actionOK = isHandsUp(lm);
    if(currentAction === "jump")  actionOK = isJump(lm);
    if(currentAction === "run")   actionOK = isRun(lm);

    if(actionOK && !beatChecked){
      const result = judgeTiming();

      if(result !== "再接再厲") {
        let earnedPoints = (result === "完美") ? 20 : 10;
        score += earnedPoints;
        scoreText.innerText = "得分: " + score;
        beatChecked = true; 
        
        showRating(result);
        scorePopUp(earnedPoints);
        particles();
      }
    }
    last = lm;
  }
});

// ===== 鏡頭啟動與主循環 =====
function startGame(){
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";

  const cam = new Camera(video,{
    onFrame: async () => await pose.send({image:video}),
    width: 640, height: 480
  });
  cam.start();

  // 倒計時器管理
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timerPanel").innerText = "倒計時: " + timeLeft;
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      clearInterval(beatInterval);
      clearInterval(actionInterval);
      endGame();
    }
  }, 1000);

  newAction();
  beatInterval = setInterval(beat, 1500);      // 1.5秒一拍，平緩溫和的節奏
  actionInterval = setInterval(newAction, 6000); // 👉 6秒才更換一次動作，確保「慢慢做」
}

function endGame(){
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "flex";
  document.getElementById("finalScore").innerText = "熱身完成！最終得分：" + score;
  if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
}
</script>

</body>
</html>
