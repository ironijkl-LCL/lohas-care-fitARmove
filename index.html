<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>FitAR 動活+ | FitAR Move+</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* ===== 開始畫面 ===== */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index: 10;
}

#startScreen {
  background:linear-gradient(#0f2027,#203a43,#2c5364);
}

#startScreen h2 {
  color:#00C2FF;
  margin-top: -5px;
  margin-bottom: 30px;
}

.start-btn {
  padding:15px 30px;
  border:none;
  border-radius:30px;
  font-size:18px;
  margin:10px;
  background:#00C2FF;
  color: black;
  font-weight:bold;
  cursor: pointer;
}

/* ===== 遊戲畫面 ===== */
#gameScreen {
  position: relative;
  width: 100vw;
  height: 100vh;
}

canvas {
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit: cover;
}

/* 左側動作選單選單 (還原圖片 UI) */
#actionMenu {
  position: absolute;
  left: 30px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.menu-item {
  width: 220px;
  padding: 12px 20px;
  background: #1e73be;
  color: white;
  border: 2px solid #00C2FF;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  text-align: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  transition: all 0.3s;
  cursor: pointer;
}

.menu-item.active {
  background: #00C2FF;
  color: black;
  transform: scale(1.08);
  box-shadow: 0 0 15px #00C2FF;
}

/* 右上方 UI */
#topUI {
  position:absolute;
  top:10px;
  right: 30px;
  z-index: 5;
}

.panel {
  display:inline-block;
  padding:10px 20px;
  margin:5px;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  font-size: 20px;
  border: 1px solid rgba(255,255,255,0.2);
}

#instruction {
  font-size:28px;
  color:#FFD600;
  text-align: center;
  position: absolute;
  top: 20px;
  width: 100%;
  z-index: 4;
}

/* 頂部大大的 WARM UP 標題 */
#stageTitle {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 42px;
  font-weight: 900;
  color: #FFF;
  text-shadow: 0 0 10px #00C2FF;
  z-index: 5;
  letter-spacing: 2px;
}

/* feedback */
#feedback {
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:120px;
  opacity:0;
  transition:0.1s;
  z-index: 5;
  pointer-events: none;
}

/* 粒子效果 */
.particle {
  position:absolute;
  width:8px;
  height:8px;
  background:#00FF88;
  border-radius:50%;
  z-index: 6;
  pointer-events: none;
  animation: particleMove 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes particleMove { to { transform: translate(var(--mx), var(--my)); opacity:0; } }

/* 分數浮字 */
#scorePop {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  color:#FFD600;
  font-weight: bold;
  opacity:0;
  z-index: 7;
  transition: transform 0.4s ease-out, opacity 0.4s ease-out;
  pointer-events: none;
}

.freeze-effect { filter: hue-rotate(180deg) brightness(1.3) contrast(1.2); }
#endScreen { display:none; background:#111; }
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>FitAR 動活+</h1>
  <h2>FitAR Move+</h2>
  <button class="start-btn" onclick="startGame()">進入熱身模式 (WARM UP)</button>
</div>

<div id="gameScreen" style="display:none;">
  <div id="stageTitle">WARM UP</div>
  
  <div id="actionMenu">
    <div class="menu-item" id="btn_run">RUN IN PLACE</div>
    <div class="menu-item" id="btn_knees">HIGH KNEES</div>
    <div class="menu-item" id="btn_star">STAR JUMPS</div>
    <div class="menu-item" id="btn_highlow">HIGH AND LOW</div>
    <div class="menu-item" id="btn_rolls">SHOULDER ROLLS</div>
    <div class="menu-item" id="btn_reach">REACH UP HIGH</div>
    <div class="menu-item" id="btn_jacks">JUMPING JACKS</div>
    <div class="menu-item" id="btn_clap">WAVE AND CLAP</div>
    <div class="menu-item" id="btn_freeze">SHAKE AND FREEZE</div>
  </div>

  <div id="topUI">
    <div id="score" class="panel">Score: 0</div>
    <div id="timer" class="panel">時間: 45</div>
  </div>

  <div id="instruction">準備...</div>
  <div id="feedback"></div>
  <div id="scorePop">+10</div>

  <video id="video" style="display:none;" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="endScreen" class="screen">
  <h1 id="finalScore"></h1>
  <button class="start-btn" onclick="location.reload()">再玩一次</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let score = 0, combo = 0, timeLeft = 45;
const actionsList = ["run", "knees", "star", "highlow", "rolls", "reach", "jacks", "clap", "freeze"];
let currentActionIndex = 0;
let currentAction = "run";
let last = null, checked = false;
let actionInterval, timerInterval;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function startGame(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";
  startCamera();
  gameLoop();
  changeActionTo(0); // 從第一個動作 RUN IN PLACE 開始
}

// 切換當前核心動作與 UI 高亮
function changeActionTo(index) {
  currentActionIndex = index;
  currentAction = actionsList[index];
  checked = false;

  // 更新左側選單高亮效果
  document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
  const activeBtn = document.getElementById(`btn_${currentAction}`);
  if(activeBtn) activeBtn.classList.add('active');

  // 更新頂部中文提示
  const chineseTips = {
    "run": "🏃 原地跑步！擺動雙臂！",
    "knees": "⚡ 高抬腿！雙膝提至腰部！",
    "star": "⭐ 星式跳躍！手腳同時張開！",
    "highlow": "↕ 高低伸展! 向上摸天、向下蹲！",
    "rolls": "🔄 轉動肩膀！放鬆肩頸！",
    "reach": "🙌 雙手高舉過頭！深呼吸！",
    "jacks": "🕺 開合跳！跟著節奏跳動！",
    "clap": "👏 揮手拍掌！在胸前擊掌！",
    "freeze": "❄ FREEZE！保持絕對不動！"
  };
  document.getElementById("instruction").innerText = chineseTips[currentAction];
}

// ===== 核心演算法：9 大動作骨架判定 =====
function checkPose(lm) {
  switch(currentAction) {
    case "run": // 原地跑：雙膝或雙腳踝產生明顯的高度差
      return Math.abs(lm[25].y - lm[26].y) > 0.05;
    
    case "knees": // 高抬腿：任一膝蓋高度超越臀部水平線
      return lm[25].y < lm[23].y || lm[26].y < lm[24].y;
    
    case "star": // 星式跳躍：手張開且雙腳大於肩寬
      return (lm[15].y < lm[0].y && lm[16].y < lm[0].y) && (Math.abs(lm[27].x - lm[28].x) > 0.3);
    
    case "highlow": // 高低伸展：手高舉 或 身體極度下蹲
      return (lm[15].y < lm[11].y) || (lm[0].y > 0.6);
    
    case "rolls": // 轉動肩膀：肩膀產生微幅上下位移
      if(!last) return false;
      return Math.abs(lm[11].y - last[11].y) > 0.02 || Math.abs(lm[12].y - last[12].y) > 0.02;
    
    case "reach": // 雙手高舉
      return lm[15].y < lm[0].y && lm[16].y < lm[0].y;
    
    case "jacks": // 開合跳
      return Math.abs(lm[27].x - lm[28].x) > 0.25;
    
    case "clap": // 揮手擊掌：雙手手腕非常靠近
      return Math.abs(lm[15].x - lm[16].x) < 0.1;
    
    case "freeze": // 冰凍定格：全身位移總和小於閾值
      if(!last) return true;
      let m = 0;
      lm.forEach((p,i)=> m += Math.abs(p.x-last[i].x) + Math.abs(p.y-last[i].y));
      return m < 0.12;
    default:
      return false;
  }
}

// ===== 特效與反饋 =====
function particles(){
  const gameScreen = document.getElementById("gameScreen");
  for(let i=0;i<20;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=(window.innerWidth/2)+"px";
    p.style.top=(window.innerHeight/2)+"px";
    const angle = Math.random() * Math.PI * 2;
    const distance = 50 + Math.random() * 150;
    p.style.setProperty('--mx', `${Math.cos(angle) * distance}px`);
    p.style.setProperty('--my', `${Math.sin(angle) * distance}px`);
    gameScreen.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

function scorePopUp(points){
  const el=document.getElementById("scorePop");
  el.innerText = "+" + points;
  el.style.opacity=1;
  el.style.transform="translate(-50%, -150%)";
  setTimeout(()=>{ el.style.opacity=0; el.style.transform="translate(-50%,-50%)"; },400);
}

function feedback(ok){
  const fb=document.getElementById("feedback");
  fb.innerText=ok?"✔":"✖";
  fb.style.color=ok?"#00FF88":"#FF3366";
  fb.style.opacity=1;
  setTimeout(()=>fb.style.opacity=0,300);
}

// ===== MediaPipe 串接 =====
const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

pose.onResults(r=>{
  ctx.save();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.translate(canvas.width,0);
  ctx.scale(-1,1);
  ctx.drawImage(r.image,0,0,canvas.width,canvas.height);
  ctx.restore();

  if(r.poseLandmarks){
    const lm = r.poseLandmarks;
    let ok = checkPose(lm);

    if(currentAction === "freeze"){
      canvas.classList.add("freeze-effect");
    } else {
      canvas.classList.remove("freeze-effect");
    }

    // 計分機制
    if(ok && !checked){
      combo++;
      let currentEarn = 10 * combo;
      score += currentEarn;
      document.getElementById('score').innerText = "Score: " + score;
      checked = true;
      feedback(true);
      particles();
      scorePopUp(currentEarn);
    }

    if(currentAction === "freeze" && !ok && last) {
      if(combo > 0) { combo = 0; feedback(false); }
    }

    last = JSON.parse(JSON.stringify(lm));
  }
});

function startCamera(){
  const cam = new Camera(video, { onFrame: async() => await pose.send({image:video}), width:640, height:480 });
  cam.start();
}

function gameLoop(){
  // 倒數計時計時器
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "時間: " + timeLeft;
    if(timeLeft <= 0) { clearInterval(timerInterval); clearInterval(actionInterval); endGame(); }
  }, 1000);

  // 每 4.5 秒自動輪替切換到下一個熱身動作
  actionInterval = setInterval(() => {
    if(!checked && currentAction !== "freeze") { combo = 0; feedback(false); }
    let nextIndex = (currentActionIndex + 1) % actionsList.length;
    changeActionTo(nextIndex);
  }, 4500);
}

function endGame(){
  document.getElementById("gameScreen").style.display="none";
  document.getElementById("endScreen").style.display="flex";
  document.getElementById("finalScore").innerText="熱身結束！最終分數："+score;
  if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
}
</script>

</body>
</html>
